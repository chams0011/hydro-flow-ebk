function CalcHydraulique(props) {
  var onClose = props.onClose;
  var ms = React.useState("hazen");
  var mode = ms[0]; var setMode = ms[1];
  var ps = React.useState({});
  var p = ps[0]; var setP = ps[1];

  function setV(k,v) {
    setP(function(prev){ var nx={}; for(var kk in prev) nx[kk]=prev[kk]; nx[k]=parseFloat(v)||0; return nx; });
  }

  // Hazen-Williams
  var hR = null;
  if (p.Q>0 && p.D>0 && p.L>0 && p.Ch>0) {
    var v_h = (p.Q/1000) / (Math.PI * Math.pow(p.D/1000/2, 2));
    var dH_h = n2(10.67 * p.L * Math.pow(p.Q,1.852) / (Math.pow(p.Ch,1.852) * Math.pow(p.D/1000,4.87)) / 1000, 3);
    hR = {dH:dH_h, v:n2(v_h,3)};
  } else if (p.dH>0 && p.D>0 && p.L>0 && p.Ch>0) {
    var Qc = n2(Math.pow((p.dH*1000*Math.pow(p.Ch,1.852)*Math.pow(p.D/1000,4.87))/(10.67*p.L), 1/1.852), 2);
    hR = {Q:Qc};
  }

  // Darcy-Weisbach
  var dR = null;
  if (p.Qd>0 && p.Dd>0 && p.Ld>0) {
    var fd = p.fd||0.02;
    var Ad = Math.PI*Math.pow(p.Dd/2,2);
    var vd2 = p.Qd/(1000*Ad);
    var hfd = n2(fd*(p.Ld/p.Dd)*Math.pow(vd2,2)/(2*9.81),3);
    var Red = n2(vd2*p.Dd/0.000001,0);
    dR = {hf:hfd, v:n2(vd2,3), Re:Red};
  }

  // Belier
  var bR = null;
  if (p.vb>0) { bR = {dP: n2(1000*(p.cb||1000)*p.vb/100000,3)}; }

  // FAVAD
  var fR = null;
  if (p.Q0f>0 && p.P0f>0 && p.Pf>0) {
    var N1f = p.N1f||1;
    var Qf = n2(p.Q0f*Math.pow(p.Pf/p.P0f,N1f),3);
    fR = {Q:Qf, red:n2((1-Math.pow(p.Pf/p.P0f,N1f))*100,1)};
  }

  var btnStyle = function(id) {
    var active = mode===id;
    return {padding:"8px 13px",background:active?"rgba(14,165,233,0.15)":C2.surface,border:"1px solid "+(active?C2.accent:C2.border),borderRadius:6,color:active?C2.accent:C2.muted,fontSize:11,fontWeight:700,cursor:"pointer"};
  };
  var inp = function(k, ph) {
    return React.createElement("div",null,
      React.createElement("div",{style:{fontSize:10,color:C2.muted,marginBottom:3}},ph),
      React.createElement("input",{type:"number",step:"any",value:p[k]||"",placeholder:"0",onChange:function(e){setV(k,e.target.value);},
        style:{width:"100%",padding:"7px 10px",background:C2.bg,border:"1px solid "+C2.border,color:C2.text,borderRadius:6,fontSize:12,outline:"none"}
      })
    );
  };
  var resRow = function(label, value, color) {
    return React.createElement("div",{style:{background:C2.surface,borderRadius:8,padding:"10px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement("span",{style:{fontSize:12,color:C2.muted}},label),
      React.createElement("span",{style:{fontFamily:"monospace",fontSize:18,fontWeight:800,color:color}},value)
    );
  };

  return React.createElement("div",
    {style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:9900,overflowY:"auto",padding:16}},
    React.createElement("div",{style:{maxWidth:860,margin:"0 auto"}},

      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontFamily:"monospace",fontSize:17,fontWeight:800,color:C2.accent,letterSpacing:2}},"CALCULATEUR HYDRAULIQUE"),
          React.createElement("div",{style:{fontSize:11,color:C2.muted}},"Hazen-Williams, Darcy-Weisbach, Coup de Belier, FAVAD")
        ),
        React.createElement("button",{onClick:onClose,style:{padding:"6px 14px",background:C2.surface,border:"1px solid "+C2.border,borderRadius:6,color:C2.muted,cursor:"pointer",fontWeight:700}},"Fermer")
      ),

      React.createElement("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}},
        React.createElement("button",{onClick:function(){setMode("hazen");},  style:btnStyle("hazen")},  "Hazen-Williams"),

      ),

// 1. Dashboard KPI multi-secteurs

// ── Couleurs partagées (compatibles avec C de l'app) ─────────────
var CA = {
  bg:"#F1F5F9", card:"#FFFFFF", surface:"#F8FAFC", border:"#E2E8F0",
  accent:"#0EA5E9", green:"#10B981", yellow:"#F59E0B", red:"#EF4444",
  purple:"#8B5CF6", text:"#1E293B", muted:"#64748B", dark:"#040b14"
};

// ── Helpers ──────────────────────────────────────────────────────
function av(v,d){ d=d===undefined?2:d; var x=parseFloat(v)||0; return parseFloat(x.toFixed(d)); }
function af(v,d){ d=d===undefined?0:d; return av(v,d).toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function ap(a,t){ if(!t) return 0; return av((a/t)*100,1); }

// ================================================================
// MODULE 1 — DASHBOARD KPI MULTI-SECTEURS
// ================================================================
function DashboardKPI(props) {
  var sectors = props.sectors || [];
  var onClose = props.onClose;
  var onSector = props.onSector || function(){};
  var refreshState = React.useState(0);
  var tick = refreshState[0]; var setTick = refreshState[1];

  React.useEffect(function(){
    var iv = setInterval(function(){ setTick(function(t){ return t+1; }); }, 30000);
    return function(){ clearInterval(iv); };
  }, []);

  // Agréger KPIs de tous les secteurs
  var agg = React.useMemo(function(){
    var enfs=[], pressions=[], debits=[], fuites=0, sectActifs=0;
    sectors.forEach(function(s){
      if (!s.data) return;
      sectActifs++;
      var ds = s.data.debit && s.data.debit.stats;
      var ps = s.data.pression && s.data.pression.stats;
      var fs = s.data.fuites;
      if (ds) { debits.push(ds.moy||0); }
      if (ps) { pressions.push(ps.moy||0); }
      if (fs && fs.rows) {
        fuites += fs.rows.filter(function(r){ return r.repare!=="Oui" && r.repare!==true; }).length;
        var tot = fs.rows.length;
        var rep = fs.rows.filter(function(r){ return r.repare==="Oui"||r.repare===true; }).length;
        if (tot>0) enfs.push(ap(tot-rep, tot));
      }
    });
    var avg = function(arr){ return arr.length ? av(arr.reduce(function(a,b){return a+b;},0)/arr.length,1) : null; };
    var min = function(arr){ return arr.length ? av(Math.min.apply(null,arr),1) : null; };
    var max = function(arr){ return arr.length ? av(Math.max.apply(null,arr),1) : null; };
    return {
      sectTotal: sectors.length, sectActifs: sectActifs,
      fuitesActives: fuites,
      enfMoy: avg(enfs), debitMoy: avg(debits),
      pressMoy: avg(pressions), pressMin: min(pressions), pressMax: max(pressions)
    };
  }, [sectors, tick]);

  function statusColor(val, warn, crit, invert) {
    if (val===null) return CA.muted;
    if (invert) { return val>=warn ? CA.green : val>=crit ? CA.yellow : CA.red; }
    return val<=warn ? CA.green : val<=crit ? CA.yellow : CA.red;
  }

  var kpiCards = [
    {l:"ENF Moyen", v: agg.enfMoy!==null ? af(agg.enfMoy,1)+"%" : "N/D", c: statusColor(agg.enfMoy,20,30,false), sub:"Objectif < 25%"},
    {l:"Fuites actives", v: String(agg.fuitesActives), c: agg.fuitesActives===0?CA.green:agg.fuitesActives<10?CA.yellow:CA.red, sub:"Non réparées"},

// ================================================================
// MODULE 2 — ALERTES AUTOMATIQUES
// ================================================================
var SONEDE_ALERTS = [];
function computeAlerts(sectors) {
  var alerts = [];
  sectors.forEach(function(s){
    if (!s.data) return;
    var ds = s.data.debit && s.data.debit.stats;
    var ps = s.data.pression && s.data.pression.stats;
    var fs = s.data.fuites;
    var name = s.name || s.id;
    if (ds && ds.max > 0) {
      if (ds.max > ds.moy * 2.5) alerts.push({sectorId:s.id, sector:name, type:"debit", level:"critical", msg:"Débit max ("+af(ds.max,1)+" l/s) > 2.5x la moyenne — anomalie probable"});
    }
    if (ps) {
      if (ps.min < 15) alerts.push({sectorId:s.id, sector:name, type:"pression", level:"critical", msg:"Pression min critique: "+af(ps.min,1)+" m (< 15 m)"});
      if (ps.max > 80) alerts.push({sectorId:s.id, sector:name, type:"pression", level:"warning", msg:"Pression max élevée: "+af(ps.max,1)+" m (> 80 m)"});
    }
    if (fs && fs.rows) {
      var fAct = fs.rows.filter(function(r){return r.repare!=="Oui"&&r.repare!==true;}).length;
      var enf = ap(fAct, fs.rows.length);
      if (enf > 30) alerts.push({sectorId:s.id, sector:name, type:"enf", level:"critical", msg:"ENF "+enf+"% — au-dessus du seuil critique (30%)"});
      else if (enf > 20) alerts.push({sectorId:s.id, sector:name, type:"enf", level:"warning", msg:"ENF "+enf+"% — au-dessus de l'objectif (20%)"});
      if (fAct > 15) alerts.push({sectorId:s.id, sector:name, type:"fuites", level:"critical", msg:fAct+" fuites non réparées — intervention urgente"});
    }
  });
  SONEDE_ALERTS = alerts;
  return alerts;
}

function MNFPanel(props) {
  var sector = props.sector;
  var onClose = props.onClose;

  var data = sector && sector.data && sector.data.debit;
  var rows = data && data.rows ? data.rows : [];
  var km = sector && sector.data && sector.data.reseau ? (sector.data.reseau.totalKm||0) : (sector.kmReseau||0);
  var conn = sector && sector.nbrAbonnes ? sector.nbrAbonnes : 0;

  // Calcul MNF : min de débit entre 2h-4h du matin
  var mnfRows = rows.filter(function(r){
    if (!r.time) return false;
    var hh = parseInt((r.time||"").split(":")[0]||"12");
    return hh >= 2 && hh <= 4;
  });
  var mnf = mnfRows.length ? av(Math.min.apply(null, mnfRows.map(function(r){return r.value||r.debit||r.v||0;})),2) : null;
  var mnfMoy = mnfRows.length ? av(mnfRows.reduce(function(s,r){return s+(r.value||r.debit||r.v||0);},0)/mnfRows.length,2) : null;

  // Si pas d'heure, utiliser les 10% des valeurs les plus basses
  if (mnf===null && rows.length > 5) {
    var vals = rows.map(function(r){return r.value||r.debit||r.v||0;}).filter(Boolean).sort(function(a,b){return a-b;});
    var nMNF = Math.max(1, Math.floor(vals.length*0.1));
    var mnfVals = vals.slice(0,nMNF);
    mnf = av(mnfVals.reduce(function(s,v){return s+v;},0)/mnfVals.length, 2);
    mnfMoy = mnf;
  }

  // Benchmark IWA (fuites inévitables) = UARL
  var uarl = km > 0 ? av(0.02*km*365/365, 2) : null;
  var fuitesNocturnes = mnf !== null && uarl !== null ? av(Math.max(0, mnf - uarl), 2) : null;
  var ilfNuit = km > 0 && fuitesNocturnes !== null ? av(fuitesNocturnes/km*1000, 1) : null;

  // Nuits anormales (points > MNF*2)
  var anomalies = rows.filter(function(r){
    var v = r.value||r.debit||r.v||0;
    return mnf !== null && v > mnf*2.5;
  }).length;

  // Données graphique : regrouper par index de points
  var chartData = rows.slice(0, 96).map(function(r, i){
    return {i:i, v:av(r.value||r.debit||r.v||0,2), label:r.time||r.date||String(i)};
  });

  // SVG mini-chart
  var chartW=560, chartH=120;
  var maxV = Math.max.apply(null, chartData.map(function(d){return d.v;})) || 1;
  var svgPaths = chartData.map(function(d,i){
    var x = av(i*(chartW/(chartData.length-1||1)), 1);
    var y = av(chartH - (d.v/maxV)*chartH, 1);
    return (i===0?"M":"L")+x+" "+y;
  }).join(" ");
  var mnfY = mnf !== null ? av(chartH-(mnf/maxV)*chartH, 1) : null;
  var uarlY = uarl !== null ? av(chartH-(uarl/maxV)*chartH, 1) : null;

  return React.createElement("div",
    {style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:9800,overflowY:"auto",padding:16}},
    React.createElement("div",{style:{maxWidth:900,margin:"0 auto"}},

      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontFamily:"monospace",fontSize:18,fontWeight:800,color:CA.accent,letterSpacing:3}},"MINIMUM NIGHT FLOW (MNF)"),
          React.createElement("div",{style:{fontSize:11,color:CA.muted}},"Analyse débit nocturne — estimation fuites nocturnes — Benchmark IWA/BABE")
        ),
        React.createElement("button",{onClick:onClose,style:{padding:"6px 14px",background:CA.surface,border:"1px solid "+CA.border,borderRadius:6,color:CA.muted,cursor:"pointer",fontWeight:700}},"Fermer")
      ),

      // KPI Cards MNF
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}},
        [
          {l:"MNF mesuré",v:mnf!==null?af(mnf,2)+" l/s":"N/D",c:CA.accent,sub:"Min débit nocturne"},
          {l:"UARL (Benchmark)",v:uarl!==null?af(uarl,2)+" l/s":"N/D",c:CA.purple,sub:"Fuites inévitables IWA"},
          {l:"Fuites nocturnes",v:fuitesNocturnes!==null?af(fuitesNocturnes,2)+" l/s":"N/D",c:fuitesNocturnes>2?CA.red:CA.green,sub:"MNF - UARL"},
          {l:"ILF nuit (l/km/h)",v:ilfNuit!==null?af(ilfNuit,1):"N/D",c:ilfNuit!==null&&ilfNuit>5?CA.red:CA.yellow,sub:"Indice linéaire fuites"},
          {l:"Points analysés",v:String(rows.length),c:CA.muted,sub:"Série débit"},
          {l:"Points nocturnes",v:String(mnfRows.length||Math.floor(rows.length*0.1)),c:CA.muted,sub:"2h-4h du matin"},
          {l:"Anomalies détectées",v:String(anomalies),c:anomalies>0?CA.yellow:CA.green,sub:"Valeurs > 2.5x MNF"},
          {l:"Réseau (km)",v:km>0?af(km,1)+" km":"N/D",c:CA.muted,sub:"Longueur distribution"},
        ].map(function(k,i){
          return React.createElement("div",{key:i,
            style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:8,padding:"12px 14px",textAlign:"center"}},
            React.createElement("div",{style:{fontFamily:"monospace",fontSize:20,fontWeight:800,color:k.c}},k.v),
            React.createElement("div",{style:{fontSize:11,fontWeight:700,color:CA.text,marginTop:3}},k.l),
            React.createElement("div",{style:{fontSize:10,color:CA.muted,marginTop:2}},k.sub)
          );
        })
      ),

      // Graphique SVG
      rows.length > 0 && React.createElement("div",{style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:10,padding:18,marginBottom:16}},
        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:CA.text,marginBottom:12}},"COURBE DE DÉBIT — LIGNE MNF ET UARL"),
        React.createElement("div",{style:{overflowX:"auto"}},
          React.createElement("svg",{viewBox:"0 0 600 150",width:"100%"},
            React.createElement("rect",{x:0,y:0,width:600,height:150,fill:CA.surface,rx:6}),
            // Grille
            [0,25,50,75,100].map(function(p,i){
              var y = av(chartH*(1-p/100),1);
              return React.createElement("line",{key:i,x1:20,y1:y+15,x2:580,y2:y+15,stroke:CA.border,strokeWidth:0.5});
            }),
            // Courbe débit
            chartData.length > 1 && React.createElement("path",{d:"M"+chartData.map(function(d,i){
              var x=av(20+i*(560/(chartData.length-1||1)),1);
              var y=av(15+chartH-(d.v/maxV)*chartH,1);
              return x+" "+y;
            }).join("L"),fill:"none",stroke:CA.accent,strokeWidth:1.5}),
            // Ligne MNF
            mnfY!==null && React.createElement("line",{x1:20,y1:mnfY+15,x2:580,y2:mnfY+15,stroke:CA.yellow,strokeWidth:1.5,strokeDasharray:"6 3"}),
            mnfY!==null && React.createElement("text",{x:524,y:mnfY+12,fontSize:9,fill:CA.yellow,fontWeight:"bold"},"MNF"),
            // Ligne UARL
            uarlY!==null && React.createElement("line",{x1:20,y1:uarlY+15,x2:580,y2:uarlY+15,stroke:CA.green,strokeWidth:1,strokeDasharray:"3 3"}),
            uarlY!==null && React.createElement("text",{x:516,y:uarlY+12,fontSize:9,fill:CA.green,fontWeight:"bold"},"UARL")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:16,marginTop:8,fontSize:11,color:CA.muted}},
          React.createElement("span",{style:{color:CA.accent}},"— Débit"),
          React.createElement("span",{style:{color:CA.yellow}},"-- MNF"),
          React.createElement("span",{style:{color:CA.green}},"-- UARL (Benchmark IWA)")
        )
      ),

      // Recommandations MNF
      React.createElement("div",{style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:10,padding:18}},
        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:CA.text,marginBottom:10}},"INTERPRÉTATION ET RECOMMANDATIONS"),
        React.createElement("div",{style:{display:"grid",gap:8}},
          [
            fuitesNocturnes!==null&&fuitesNocturnes>2 ? {l:"Fuites significatives détectées",d:"MNF - UARL = "+af(fuitesNocturnes,2)+" l/s — Campagne de détection acoustique recommandée",c:CA.red} : null,
            mnf!==null&&uarl!==null&&mnf<=uarl*1.1 ? {l:"Réseau en bonne santé",d:"MNF proche de l'UARL — fuites contenues dans les limites IWA",c:CA.green} : null,
            anomalies>0 ? {l:anomalies+" nuit(s) anormale(s)",d:"Vérifier débits > 2.5x MNF — possible vannes ouvertes ou rupture",c:CA.yellow} : null,

function TechnicienView(props) {

  var activeSector = sectorState[0]; var setActiveSector = sectorState[1];

  var form = formState[0]; var setForm = formState[1];
  var notifState = React.useState(null);
  var notif = notifState[0]; var setNotif = notifState[1];

  function setF(k,v){ setForm(function(prev){ var n={}; for(var kk in prev)n[kk]=prev[kk]; n[k]=v; return n; }); }

  // Charger tournées assignées
  var tournees = React.useMemo(function(){
    var all = [];
    sectors.forEach(function(s){
      try {
        var t = JSON.parse(localStorage.getItem("interventions_"+s.id)||"[]");
        t.forEach(function(item){
          if (!item.technicien || item.technicien.toLowerCase().indexOf(currentUser.name.toLowerCase().split(" ")[0])>=0) {
            all.push(Object.assign({},item,{sectorName:s.name||s.id,sectorId:s.id}));
          }
        });
      } catch(e){}
    });
    return all;
  }, [sectors, currentUser]);

  function saveIntervention() {
    if (!activeSector||!form.date||!form.desc) { setNotif({t:"Renseignez la date et la description.",c:CA.red}); return; }
    var key = "interventions_"+activeSector.id;
    var existing = [];
    try { existing = JSON.parse(localStorage.getItem(key)||"[]"); } catch(e){}
    existing.push({
      id: Date.now(), date:form.date, lieu:form.lieu, description:form.desc,
      debit:form.debit, pression:form.pression, statut:form.statut,
      technicien:currentUser.name, photo:form.photo, createdAt:new Date().toISOString()
    });
    localStorage.setItem(key, JSON.stringify(existing));
    if (window.storage) window.storage.set(key, JSON.stringify(existing)).catch(function(){});
    setNotif({t:"Intervention enregistrée avec succès.",c:CA.green});
    setForm({date:"",lieu:"",desc:"",debit:"",pression:"",statut:"Planifiée",photo:""});
    setTimeout(function(){setNotif(null);}, 3000);
  }

// ================================================================
// MODULE 5 — COMPARAISON N vs N-1
// ================================================================
function ComparaisonPanel(props) {
  var sector = props.sector;
  var type = props.dataType || "debit";
  var onClose = props.onClose;

  var data = sector && sector.data && sector.data[type];
  var rows = data && data.rows ? data.rows : [];

  // Séparer les données en deux moitiés (simulation N vs N-1)
  var half = Math.floor(rows.length / 2);
  var period1 = rows.slice(0, half);
  var period2 = rows.slice(half);

  var avg = function(arr){ return arr.length ? av(arr.reduce(function(s,r){return s+(r.value||r.debit||r.pression||r.v||0);},0)/arr.length,2) : 0; };
  var moy1 = avg(period1), moy2 = avg(period2);
  var delta = moy1 > 0 ? av(((moy2-moy1)/moy1)*100, 1) : 0;
  var unit = type==="debit" ? "l/s" : "m";

  // SVG superposition
  var maxV = Math.max.apply(null, rows.map(function(r){return r.value||r.debit||r.pression||r.v||0;})) || 1;
  function pathForPeriod(arr, color) {
    if (!arr.length) return null;
    var d = arr.map(function(r,i){
      var x = av(20+i*(540/(arr.length-1||1)),1);
      var y = av(15+(120-(((r.value||r.debit||r.pression||r.v||0)/maxV)*120)),1);
      return (i===0?"M":"L")+x+" "+y;
    }).join(" ");
    return React.createElement("path",{d:d,fill:"none",stroke:color,strokeWidth:1.5,opacity:0.85});
  }

  return React.createElement("div",
    {style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:9800,overflowY:"auto",padding:16}},
    React.createElement("div",{style:{maxWidth:860,margin:"0 auto"}},

      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontFamily:"monospace",fontSize:18,fontWeight:800,color:CA.accent,letterSpacing:3}},"COMPARAISON N vs N-1"),
          React.createElement("div",{style:{fontSize:11,color:CA.muted}},"Superposition des périodes — "+sector.name+" — "+(type==="debit"?"Débits":"Pressions"))
        ),
        React.createElement("button",{onClick:onClose,style:{padding:"6px 14px",background:CA.surface,border:"1px solid "+CA.border,borderRadius:6,color:CA.muted,cursor:"pointer",fontWeight:700}},"Fermer")
      ),

      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}},
        [
          {l:"Période N-1 (moy.)", v:af(moy1,2)+" "+unit, c:CA.accent},
          {l:"Période N (moy.)",   v:af(moy2,2)+" "+unit, c:CA.purple},
          {l:"Variation",          v:(delta>0?"+":"")+af(delta,1)+"%", c:delta>5?CA.red:delta<-5?CA.green:CA.yellow},
        ].map(function(k,i){
          return React.createElement("div",{key:i,style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:8,padding:"14px",textAlign:"center"}},
            React.createElement("div",{style:{fontFamily:"monospace",fontSize:22,fontWeight:800,color:k.c}},k.v),
            React.createElement("div",{style:{fontSize:11,color:CA.muted,marginTop:4}},k.l)
          );
        })
      ),

      rows.length > 4 && React.createElement("div",{style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:10,padding:18,marginBottom:14}},
        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:CA.text,marginBottom:12}},"SUPERPOSITION DES DEUX PÉRIODES"),
        React.createElement("svg",{viewBox:"0 0 580 150",width:"100%"},
          React.createElement("rect",{x:0,y:0,width:580,height:150,fill:CA.surface,rx:6}),
          pathForPeriod(period1, CA.accent),
          pathForPeriod(period2, CA.purple)
        ),
        React.createElement("div",{style:{display:"flex",gap:16,marginTop:8,fontSize:11}},
          React.createElement("span",{style:{color:CA.accent}},"— Période N-1"),
          React.createElement("span",{style:{color:CA.purple}},"— Période N"),
          delta!==0 && React.createElement("span",{style:{color:delta>5?CA.red:CA.green,fontWeight:700}},
            delta>0?"Hausse de +"+af(delta,1)+"% par rapport à N-1":"Baisse de "+af(Math.abs(delta),1)+"% par rapport à N-1"
          )
        )
      ),

      // Tableau stats comparatif
      React.createElement("div",{style:{background:CA.card,border:"1px solid "+CA.border,borderRadius:10,padding:18}},
        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:CA.text,marginBottom:10}},"STATISTIQUES COMPARATIVES"),
        React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
          React.createElement("thead",null,
            React.createElement("tr",{style:{background:CA.surface}},
              ["Métrique","Période N-1","Période N","Delta"].map(function(h){
                return React.createElement("th",{key:h,style:{padding:"8px 10px",textAlign:"left",color:CA.muted,fontWeight:600,borderBottom:"1px solid "+CA.border}},h);
              })
            )
          ),
          React.createElement("tbody",null,
            [
              {l:"Moyenne",v1:moy1,v2:moy2},
              {l:"Maximum",v1:av(Math.max.apply(null,period1.map(function(r){return r.value||r.v||0;})),2),v2:av(Math.max.apply(null,period2.map(function(r){return r.value||r.v||0;})),2)},
              {l:"Minimum",v1:av(Math.min.apply(null,period1.map(function(r){return r.value||r.v||0;})),2),v2:av(Math.min.apply(null,period2.map(function(r){return r.value||r.v||0;})),2)},
              {l:"Points de données",v1:period1.length,v2:period2.length,noUnit:true},
            ].map(function(row,i){
              var d = row.v1>0?av(((row.v2-row.v1)/row.v1)*100,1):0;
              return React.createElement("tr",{key:i,style:{borderBottom:"1px solid "+CA.border+"33"}},
                React.createElement("td",{style:{padding:"8px 10px",fontWeight:600,color:CA.text}},row.l),
                React.createElement("td",{style:{padding:"8px 10px",fontFamily:"monospace",color:CA.accent}},af(row.v1,row.noUnit?0:2)+(row.noUnit?"":" "+unit)),
                React.createElement("td",{style:{padding:"8px 10px",fontFamily:"monospace",color:CA.purple}},af(row.v2,row.noUnit?0:2)+(row.noUnit?"":" "+unit)),
                React.createElement("td",{style:{padding:"8px 10px",fontFamily:"monospace",color:d>5?CA.red:d<-5?CA.green:CA.yellow}},!row.noUnit?(d>0?"+":"")+af(d,1)+"%" : "")
              );
            })
          )
        )
      )
    )
  );
}

  var form = formS[0]; var setForm = formS[1];

  function saveItems(v){ setItems(v); localStorage.setItem(WKEY,JSON.stringify(v)); if(window.storage)window.storage.set(WKEY,JSON.stringify(v)).catch(function(){}); }
  function setF(k,v){ setForm(function(p){ var n={}; for(var kk in p)n[kk]=p[kk]; n[k]=v; return n; }); }

  function addItem(){
    if (!form.titre||!form.lieu) return;

      return Object.assign({},it,{statut:ns,history:(it.history||[]).concat([{statut:ns,date:new Date().toISOString()}])});

    saveItems(nw);

          React.createElement("div",{style:{fontSize:11,color:CA.muted}},"Pipeline de traitement des fuites — Secteur: "+(sector.name||sector.id))

        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:CA.green,marginBottom:12}},"NOUVELLE FUITE"),

    if (saved) { NRW_I18N.current = saved; return saved; }
    var browser = (navigator.language || navigator.userLanguage || "fr").substring(0,2).toLowerCase();
    var supported = NRW_I18N.LANGS.map(function(l){return l.code;});
    var lang = supported.indexOf(browser) >= 0 ? browser : "fr";
    NRW_I18N.current = lang;
    return lang;
  },

  setLang: function(code) {
    NRW_I18N.current = code;
    try { localStorage.setItem("nrw_lang", code); } catch(e){}
    // RTL support
    var langObj = NRW_I18N.LANGS.find(function(l){return l.code===code;});
    if (langObj) {
      document.documentElement.setAttribute("dir", langObj.dir);
      document.documentElement.setAttribute("lang", code);
    }
  }
};

// ── Helpers analytiques ──────────────────────────────────────────
function calcAvg(arr) {
  if (!arr || !arr.length) return 0;
  return arr.reduce(function(s,v){ return s + (parseFloat(v)||0); }, 0) / arr.length;
}
function calcStdDev(arr) {
  if (!arr || arr.length < 2) return 0;
  var avg = calcAvg(arr);
  var variance = arr.reduce(function(s,v){ return s + Math.pow((parseFloat(v)||0)-avg,2); },0) / arr.length;
  return Math.sqrt(variance);
}
function getRowValues(rows) {
  return (rows||[]).map(function(r){ return parseFloat(r.value||r.debit||r.pression||r.niveau||r.v||0)||0; });
}
function getHourFromRow(r) {
  if (!r.time && !r.date) return -1;
  var t = r.time || r.date || "";
  var m = t.match(/(\d{1,2})[:\h]/);
  return m ? parseInt(m[1]) : -1;
}

// ── Historique des modifications ─────────────────────────────────
var HISTORY_KEY = "leaksense_history";
function addHistory(action, detail, user) {
  var entry = {
    id: Date.now(),
    ts: new Date().toISOString(),
    user: user || "Système",
    action: action,
    detail: detail
  };
  var history = [];
  try { history = JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]"); } catch(e) {}
  history.unshift(entry);
  if (history.length > 500) history = history.slice(0, 500);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
  if (window.storage) window.storage.set(HISTORY_KEY, JSON.stringify(history)).catch(function(){});
}
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]"); } catch(e) { return []; }
}

// COMPOSANT 1 — SCORE DE SANTÉ DU SECTEUR
// ================================================================
function ScoreSante(props) {
  var sector = props.sector;
  var compact = props.compact || false;

  var ds = sector.data && sector.data.debit && sector.data.debit.stats;
  var ps = sector.data && sector.data.pression && sector.data.pression.stats;
  var fs = sector.data && sector.data.fuites;
  var km = (sector.data && sector.data.reseau && sector.data.reseau.totalKm) || sector.kmReseau || 0;

  var rdfData = (fs && fs.fuites && fs.fuites.length > 0) ? fs.fuites : [];
  var fActives = rdfData.filter(function(r){ return r.repare!==1&&r.repare!==true&&(!r.dateRepair||r.dateRepair==="—"); }).length;
  var enf = rdfData.length > 0 ? parseFloat(((fActives/rdfData.length)*100).toFixed(1)) : null;

  // Calcul score 0-100
  var scores = [];
  var details = [];

  // ENF score (poids 30%)
  if (enf !== null) {
    var enfScore = enf <= 10 ? 100 : enf <= 20 ? 80 : enf <= 30 ? 50 : enf <= 40 ? 25 : 0;
    scores.push({label:"ENF", score:enfScore, weight:30, val:enf+"%", ok:enf<=25});
    details.push({l:"ENF (Eau Non Facturée)", v:enf+"%", s:enfScore, tgt:"< 25%"});
  }

  // Pression score (poids 25%)
  if (ps) {
    var pMoy = ps.moy || ps.avgPressure || 0;
    var pMin = ps.min || 0;
    var pScore = (pMoy>=30&&pMoy<=60&&pMin>=15) ? 100 : (pMoy>=25&&pMoy<=70&&pMin>=10) ? 65 : 30;
    scores.push({label:"Pression", score:pScore, weight:25, val:parseFloat(pMoy).toFixed(1)+" m", ok:pMoy>=30&&pMoy<=60});
    details.push({l:"Pression moyenne", v:parseFloat(pMoy).toFixed(1)+" m", s:pScore, tgt:"30-60 m"});
  }

  // ILF score (poids 25%)
  if (fs && fs.stats && km > 0) {
    var ilf = parseFloat((fs.stats.total / km).toFixed(2));
    var ilfScore = ilf <= 1 ? 100 : ilf <= 2 ? 75 : ilf <= 3 ? 50 : ilf <= 5 ? 25 : 0;
    scores.push({label:"ILF", score:ilfScore, weight:25, val:ilf+" f/km", ok:ilf<=2});
    details.push({l:"Indice linéaire fuites", v:ilf+" f/km", s:ilfScore, tgt:"< 2 f/km"});
  }

  // Débit score (poids 20%)
  if (ds) {
    var rows = sector.data.debit.rows || [];
    var vals = getRowValues(rows);
    var std = calcStdDev(vals);
    var avg = calcAvg(vals);
    var cv = avg > 0 ? (std/avg)*100 : 0;
    var dScore = cv <= 15 ? 100 : cv <= 30 ? 70 : cv <= 50 ? 40 : 10;
    scores.push({label:"Débit", score:dScore, weight:20, val:parseFloat(avg).toFixed(1)+" l/s", ok:cv<=30});
    details.push({l:"Stabilité débit (CV)", v:parseFloat(cv).toFixed(1)+"%", s:dScore, tgt:"< 30%"});
  }

  // Score global pondéré
  var totalWeight = scores.reduce(function(s,x){ return s+x.weight; }, 0);
  var globalScore = totalWeight > 0
    ? Math.round(scores.reduce(function(s,x){ return s+(x.score*x.weight); },0) / totalWeight)
    : null;

  var scoreColor = globalScore === null ? C.muted : globalScore >= 75 ? C.green : globalScore >= 50 ? C.yellow : C.red;
  var scoreLabel = globalScore === null ? "N/D" : globalScore >= 75 ? "BON" : globalScore >= 50 ? "MOYEN" : "CRITIQUE";

  if (compact) {
    return React.createElement("div",
      {style:{display:"flex",alignItems:"center",gap:8,background:scoreColor+"12",border:"1px solid "+scoreColor+"44",borderRadius:8,padding:"6px 12px"}},
      React.createElement("div",{style:{fontSize:20,fontWeight:900,color:scoreColor,fontFamily:"monospace"}}, globalScore!==null?globalScore:"?"),
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:10,fontWeight:700,color:scoreColor}},scoreLabel),
        React.createElement("div",{style:{fontSize:9,color:C.muted}},"Score santé")
      )
    );
  }

  return React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18,marginBottom:14}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:16,marginBottom:14}},
      React.createElement("div",{style:{width:80,height:80,borderRadius:"50%",border:"4px solid "+scoreColor,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:scoreColor+"10"}},
        React.createElement("div",{style:{fontSize:26,fontWeight:900,color:scoreColor,fontFamily:"monospace",lineHeight:1}}, globalScore!==null?globalScore:"?"),
        React.createElement("div",{style:{fontSize:8,color:scoreColor,fontWeight:700,letterSpacing:1}},"/100")
      ),
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:16,fontWeight:800,color:scoreColor}},scoreLabel),
        React.createElement("div",{style:{fontSize:11,color:C.muted}},"Score de santé global du secteur"),
        React.createElement("div",{style:{fontSize:10,color:C.muted,marginTop:2}},scores.length+" indicateurs analysés")
      ),
      // Barre de progression
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{height:8,background:C.border,borderRadius:4,overflow:"hidden"}},
          React.createElement("div",{style:{width:(globalScore||0)+"%",height:"100%",background:scoreColor,borderRadius:4,transition:"width 0.8s ease"}})
        ),
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginTop:3}},
          React.createElement("span",null,"0"),
          React.createElement("span",null,"Critique < 50"),
          React.createElement("span",null,"Bon ≥ 75"),
          React.createElement("span",null,"100")
        )
      )
    ),
    // Détail par indicateur
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}},
      details.map(function(d,i){
        var col = d.s>=75?C.green:d.s>=50?C.yellow:C.red;
        return React.createElement("div",{key:i,style:{background:col+"0d",border:"1px solid "+col+"33",borderRadius:8,padding:"10px 12px",textAlign:"center"}},
          React.createElement("div",{style:{fontSize:16,fontWeight:800,color:col,fontFamily:"monospace"}},d.v),
          React.createElement("div",{style:{fontSize:10,color:C.text,fontWeight:600,marginTop:3}},d.l),
          React.createElement("div",{style:{fontSize:9,color:C.muted,marginTop:2}},"Cible: "+d.tgt),
          React.createElement("div",{style:{background:col,borderRadius:10,height:3,marginTop:6,width:(d.s)+"%",transition:"width 0.6s"}})
        );
      })
    )
  );
}

// ================================================================
// COMPOSANT 3 — DÉTECTION AUTOMATIQUE DES ANOMALIES
// ================================================================
function AnomaliesPanel(props) {
  var sector = props.sector;
  var anomalies = [];

  function detectAnomalies(rows, label, unit) {
    var vals = getRowValues(rows);
    if (vals.length < 5) return;
    var avg = calcAvg(vals);
    var std = calcStdDev(vals);
    var seuil = avg + 2.5 * std;
    var seuilBas = avg - 2.5 * std;
    rows.forEach(function(r, i) {
      var v = parseFloat(r.value||r.debit||r.pression||r.v||0)||0;
      if (v > seuil && seuil > 0) {
        anomalies.push({type:"high", label:label, val:parseFloat(v.toFixed(2)), avg:parseFloat(avg.toFixed(2)), seuil:parseFloat(seuil.toFixed(2)), unit:unit, time:r.time||r.date||"Point "+i, idx:i});
      } else if (v < seuilBas && seuilBas > 0 && v > 0) {
        anomalies.push({type:"low", label:label, val:parseFloat(v.toFixed(2)), avg:parseFloat(avg.toFixed(2)), seuil:parseFloat(seuilBas.toFixed(2)), unit:unit, time:r.time||r.date||"Point "+i, idx:i});
      }
    });
  }

  if (sector.data) {
    if (sector.data.debit && sector.data.debit.rows)    detectAnomalies(sector.data.debit.rows,    "Débit",    "l/s");
    if (sector.data.pression && sector.data.pression.rows) detectAnomalies(sector.data.pression.rows, "Pression", "m");
    if (sector.data.niveau && sector.data.niveau.rows)  detectAnomalies(sector.data.niveau.rows,  "Niveau",   "m");
  }

  return React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18,marginBottom:14}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
      React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.text}},"ANOMALIES DÉTECTÉES AUTOMATIQUEMENT"),
      React.createElement("span",{style:{padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:700,background:anomalies.length>0?C.red+"22":C.green+"22",color:anomalies.length>0?C.red:C.green}},
        anomalies.length > 0 ? anomalies.length+" anomalie(s)" : "✓ Aucune anomalie"
      )
    ),
    anomalies.length === 0
      ? React.createElement("div",{style:{textAlign:"center",color:C.muted,fontSize:12,padding:"20px 0"}},"Toutes les valeurs sont dans les plages normales (±2.5σ)")
      : React.createElement("div",{style:{display:"grid",gap:8}},
          anomalies.slice(0,10).map(function(a,i){
            var col = a.type==="high" ? C.red : C.yellow;
            var icon = a.type==="high" ? "↑" : "↓";
            var pct = a.avg > 0 ? Math.abs(Math.round((a.val-a.avg)/a.avg*100)) : 0;
            return React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:12,background:col+"0d",border:"1px solid "+col+"33",borderRadius:8,padding:"10px 14px"}},
              React.createElement("div",{style:{width:28,height:28,borderRadius:"50%",background:col+"22",color:col,fontSize:14,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}},icon),
              React.createElement("div",{style:{flex:1}},
                React.createElement("div",{style:{fontSize:12,fontWeight:700,color:C.text}},a.label+" — "+a.time),
                React.createElement("div",{style:{fontSize:11,color:C.muted}},"Valeur: "+a.val+" "+a.unit+" | Moyenne: "+a.avg+" "+a.unit+" | Écart: +"+pct+"%")
              ),
              React.createElement("div",{style:{fontSize:12,fontWeight:700,color:col}},a.type==="high"?"Valeur haute":"Valeur basse")
            );
          })
        )
  );

// ================================================================
// COMPOSANT 4 — TENDANCES (↑↓ sur KPIs)
// ================================================================
function TendanceKPI(props) {
  var label = props.label;
  var valeur = props.valeur;
  var unit = props.unit||"";
  var historique = props.historique||[];

  if (historique.length < 2) return null;
  var vals = getRowValues(historique);
  var n = vals.length;
  var recent = calcAvg(vals.slice(Math.floor(n*0.75)));
  var ancien  = calcAvg(vals.slice(0, Math.floor(n*0.25)));
  if (ancien === 0) return null;
  var delta = parseFloat(((recent-ancien)/ancien*100).toFixed(1));
  var hausse = delta > 2;
  var baisse = delta < -2;
  var col = hausse ? C.red : baisse ? C.green : C.muted;
  var arrow = hausse ? "↑" : baisse ? "↓" : "→";

  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
    React.createElement("span",{style:{fontSize:20,color:col,fontWeight:900}},arrow),
    React.createElement("span",{style:{fontSize:11,color:col,fontWeight:700}},
      (delta > 0 ? "+" : "")+delta+"% vs période précédente"
    )
  );
}

// COMPOSANT 5 — PRÉVISION 7 JOURS (régression linéaire simple)
// ================================================================
function Prevision7j(props) {
  var sector = props.sector;
  var type = props.type || "debit";

  var data = sector.data && sector.data[type];
  var rows = data && data.rows ? data.rows : [];
  var vals = getRowValues(rows);

  if (vals.length < 10) return null;

  // Régression linéaire
  var n = vals.length;
  var sumX=0, sumY=0, sumXY=0, sumX2=0;
  vals.forEach(function(v,i){ sumX+=i; sumY+=v; sumXY+=i*v; sumX2+=i*i; });
  var slope = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
  var intercept = (sumY - slope*sumX) / n;

  // Prévision pour les 7 prochains points
  var previsions = [];
  for (var i=0; i<7; i++) {
    var xi = n + i;
    var yi = parseFloat((intercept + slope*xi).toFixed(2));
    previsions.push({j:i+1, v:Math.max(0,yi)});
  }

  var tendance = slope > 0.05 ? "hausse" : slope < -0.05 ? "baisse" : "stable";
  var tendCol = tendance==="hausse"?C.red:tendance==="baisse"?C.green:C.muted;
  var unit = type==="debit"?"l/s":"m";

  return React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18,marginBottom:14}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.text}},"PRÉVISION 7 PROCHAINS POINTS"),
      React.createElement("span",{style:{padding:"3px 10px",borderRadius:10,fontSize:11,fontWeight:700,background:tendCol+"22",color:tendCol}},
        "Tendance : "+tendance
      )
    ),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}},
      previsions.map(function(p,i){
        var maxP = Math.max.apply(null, previsions.map(function(x){return x.v;}));
        var h = maxP > 0 ? Math.max(10, Math.round((p.v/maxP)*60)) : 10;
        var col = p.v > calcAvg(vals)*1.2 ? C.red : p.v < calcAvg(vals)*0.8 ? C.yellow : C.accent;
        return React.createElement("div",{key:i,style:{textAlign:"center"}},
          React.createElement("div",{style:{height:70,display:"flex",alignItems:"flex-end",justifyContent:"center",marginBottom:4}},
            React.createElement("div",{style:{width:"70%",height:h+"px",background:col,borderRadius:"4px 4px 0 0",opacity:0.8}})
          ),
          React.createElement("div",{style:{fontSize:10,fontFamily:"monospace",color:col,fontWeight:700}},p.v),
          React.createElement("div",{style:{fontSize:9,color:C.muted}},"J+"+p.j)
        );
      })
    ),
    React.createElement("div",{style:{fontSize:10,color:C.muted,marginTop:8,textAlign:"center"}},"Basé sur régression linéaire des "+n+" dernières mesures — "+unit)
  );
}

// ================================================================
// COMPOSANT 6 — ANALYSE HEURE PAR HEURE
// ================================================================
function AnalyseHoraire(props) {
  var sector = props.sector;
  var type = props.type || "debit";

  var data = sector.data && sector.data[type];
  var rows = data && data.rows ? data.rows : [];
  var unit = type==="debit"?"l/s":"m";

  // Grouper par heure
  var byHour = {};
  rows.forEach(function(r) {
    var h = getHourFromRow(r);
    if (h < 0 || h > 23) return;
    if (!byHour[h]) byHour[h] = [];
    byHour[h].push(parseFloat(r.value||r.debit||r.pression||r.v||0)||0);
  });

  var hourlyData = [];
  for (var h=0; h<24; h++) {
    var arr = byHour[h] || [];
    hourlyData.push({h:h, avg:arr.length?parseFloat(calcAvg(arr).toFixed(2)):null, n:arr.length});
  }

  var validHours = hourlyData.filter(function(d){return d.avg!==null;});
  if (validHours.length < 4) return null;

  var maxVal = Math.max.apply(null, validHours.map(function(d){return d.avg;}));
  var mnfHour = validHours.slice().sort(function(a,b){return a.avg-b.avg;})[0];
  var peakHour = validHours.slice().sort(function(a,b){return b.avg-a.avg;})[0];

  return React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18,marginBottom:14}},
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}},"PROFIL JOURNALIER — ANALYSE HEURE PAR HEURE"),

    // Graphique barres 24h
    React.createElement("div",{style:{overflowX:"auto",marginBottom:12}},
      React.createElement("svg",{viewBox:"0 0 600 100",width:"100%"},
        hourlyData.map(function(d,i){
          if (d.avg === null) return null;
          var barW = 22;
          var barH = maxVal > 0 ? Math.max(2, Math.round((d.avg/maxVal)*80)) : 2;
          var x = i*(600/24) + (600/24-barW)/2;
          var y = 90 - barH;
          var isMNF = d.h === mnfHour.h;
          var isPeak= d.h === peakHour.h;
          var col = isMNF ? C.green : isPeak ? C.red : (d.h>=2&&d.h<=4) ? C.yellow : C.accent;
          return React.createElement("g",{key:i},
            React.createElement("rect",{x:x,y:y,width:barW,height:barH,fill:col,rx:2,opacity:0.85}),
            React.createElement("text",{x:x+barW/2,y:95,textAnchor:"middle",fontSize:7,fill:C.muted},d.h+"h")
          );
        }).filter(Boolean)
      )
    ),

    // Légende
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}},
      [
        {l:"MNF (débit min nocturne)", h:mnfHour.h+"h", v:mnfHour.avg+" "+unit, c:C.green},
        {l:"Pic de consommation",      h:peakHour.h+"h",v:peakHour.avg+" "+unit, c:C.red},
        {l:"Plage nocturne (2h-4h)",   h:"2h-4h",       v:"Analyse MNF",         c:C.yellow},
      ].map(function(item,i){
        return React.createElement("div",{key:i,style:{background:item.c+"0d",border:"1px solid "+item.c+"33",borderRadius:8,padding:"8px 12px"}},
          React.createElement("div",{style:{fontSize:10,color:C.muted}},item.l),
          React.createElement("div",{style:{fontSize:13,fontWeight:700,color:item.c,marginTop:2}},item.h+" — "+item.v)
        );
      })
    )
  );
}

// COMPOSANT 8 — DÉLAI MOYEN DE RÉPARATION
// ================================================================
function DelaiReparation(props) {
  var sector = props.sector;
  var fs = sector.data && sector.data.fuites;
  var rdfData = (fs && fs.fuites && fs.fuites.length > 0) ? fs.fuites : [];

  var repairData = rdfData.filter(function(r){
    return r.dateDetect && r.dateRepair && r.dateRepair !== "—";
  }).map(function(r){
    var d1 = new Date(r.dateDetect);
    var d2 = new Date(r.dateRepair);
    var diff = Math.max(0, Math.round((d2-d1)/(1000*60*60*24)));
    return Object.assign({},r,{delai:diff});
  });

  var fActives = rdfData.filter(function(r){ return r.repare!==1&&r.repare!==true&&(!r.dateRepair||r.dateRepair==="—"); }).length;
  var avgDelai = repairData.length > 0 ? parseFloat(calcAvg(repairData.map(function(r){return r.delai;})).toFixed(1)) : null;
  var maxDelai = repairData.length > 0 ? Math.max.apply(null, repairData.map(function(r){return r.delai;})) : null;

  // Distribution par tranche
  var tranches = [
    {label:"< 1 jour",    min:0,  max:1,   col:C.green},
    {label:"1-7 jours",   min:1,  max:7,   col:C.yellow},
    {label:"7-30 jours",  min:7,  max:30,  col:"#F97316"},
    {label:"> 30 jours",  min:30, max:9999,col:C.red},
  ];

  tranches.forEach(function(t){
    t.count = repairData.filter(function(r){return r.delai>=t.min&&r.delai<t.max;}).length;
  });

  return React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:18,marginBottom:14}},
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.text,marginBottom:14}},"DÉLAI MOYEN DE RÉPARATION"),

    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:14}},
      [
        {l:"Fuites actives",       v:fActives+" fuites",                                c:fActives>10?C.red:C.yellow},
        {l:"Délai moyen répar.",   v:avgDelai!==null?avgDelai+" jours":"N/D",           c:avgDelai!==null&&avgDelai<=7?C.green:C.red},
        {l:"Délai max",            v:maxDelai!==null?maxDelai+" jours":"N/D",           c:C.muted},
        {l:"Fuites réparées",      v:repairData.length+" / "+rdfData.length,            c:C.green},
      ].map(function(item,i){
        return React.createElement("div",{key:i,style:{background:item.c+"0d",border:"1px solid "+item.c+"33",borderRadius:8,padding:"10px 12px",textAlign:"center"}},
          React.createElement("div",{style:{fontSize:18,fontWeight:800,color:item.c,fontFamily:"monospace"}},item.v),
          React.createElement("div",{style:{fontSize:10,color:C.muted,marginTop:4}},item.l)
        );
      })
    ),

    // Distribution
    repairData.length > 0 && React.createElement("div",null,
      React.createElement("div",{style:{fontSize:11,fontWeight:700,color:C.text,marginBottom:8}},"DISTRIBUTION DES DÉLAIS"),
      React.createElement("div",{style:{display:"grid",gap:6}},
        tranches.map(function(t,i){
          var pct = repairData.length > 0 ? Math.round((t.count/repairData.length)*100) : 0;
          return React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:10}},
            React.createElement("div",{style:{width:90,fontSize:11,color:C.muted}},t.label),
            React.createElement("div",{style:{flex:1,height:18,background:C.border,borderRadius:4,overflow:"hidden"}},
              React.createElement("div",{style:{width:pct+"%",height:"100%",background:t.col,borderRadius:4,display:"flex",alignItems:"center",paddingLeft:4}},
                pct>5&&React.createElement("span",{style:{fontSize:9,color:"#fff",fontWeight:700}},t.count)
              )
            ),
            React.createElement("div",{style:{width:30,fontSize:10,color:C.muted,textAlign:"right"}},pct+"%")
          );
        })

    )
  );
}

    +(enf!=="N/D"&&enf>25?'<div class="alert">⚠️ ENF à '+enf+'% — au-dessus du seuil de 25%</div>':'<div class="good">✓ ENF à '+enf+'% — dans la cible</div>')
    +(minP!=="N/D"&&minP<20?'<div class="alert">⚠️ Pression min '+minP+' m — sous le seuil critique de 20 m</div>':'')
    +(fActives>10?'<div class="alert">⚠️ '+fActives+' fuites actives non réparées</div>':'<div class="good">✓ '+fActives+' fuites actives</div>')
    +'</div></div></div>'

    // KPIs Débits
    +'<div class="section"><h2>Indicateurs Hydrauliques — Débits</h2>'

    +'<div class="kpi"><div class="kpi-val info">'+avgD+' l/s</div><div class="kpi-lbl">Débit moyen</div></div>'
    +'<div class="kpi"><div class="kpi-val ok">'+minD+' l/s</div><div class="kpi-lbl">Débit minimum</div></div>'
    +'<div class="kpi"><div class="kpi-val crit">'+maxD+' l/s</div><div class="kpi-lbl">Débit maximum</div></div>'
    +'<div class="kpi"><div class="kpi-val info">'+vals.length+'</div><div class="kpi-lbl">Points de mesure</div></div>'
    +'</div></div>'

    // KPIs Pressions
    +'<div class="section"><h2>Indicateurs Hydrauliques — Pressions</h2>'
    +'<div class="grid3">'
    +'<div class="kpi"><div class="kpi-val '+(avgP!=="N/D"&&avgP>=30&&avgP<=60?"ok":"warn")+'">'+avgP+' m</div><div class="kpi-lbl">Pression moyenne</div></div>'
    +'<div class="kpi"><div class="kpi-val '+(minP!=="N/D"&&minP>=20?"ok":"crit")+'">'+minP+' m</div><div class="kpi-lbl">Pression minimum</div></div>'

    +'</div>'
    +(rdfData.length>0?'<table style="margin-top:14px;"><thead><tr><th>Date</th><th>Localité</th><th>Type</th><th>Economie (l/s)</th><th>Statut</th></tr></thead><tbody>'

    +'</div>'

    // Footer
    +'<div class="footer">'
    +'<span>Hydro Flow EBK — '+(org.organism||"Gestion de l\'eau")+'</span>'
    +'<span>Rapport généré le '+now.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})+'</span>'
    +'<span>Document confidentiel</span>'
    +'</div></div></body></html>';

  // Ouvrir et imprimer
  var w = window.open("", "_blank", "width=960,height=700");
  if (w) {

    w.document.close();
    setTimeout(function(){ w.print(); }, 700);
  }
}

// COMPOSANT 12 — HISTORIQUE DES MODIFICATIONS
// ================================================================
function HistoriquePanel(props) {
  var onClose = props.onClose;
  var filterState = React.useState("");
  var filter = filterState[0]; var setFilter = filterState[1];
  var history = React.useMemo(function(){ return getHistory(); }, []);

  var filtered = filter
    ? history.filter(function(h){
        var q = filter.toLowerCase();
        return (h.action||"").toLowerCase().includes(q)
          || (h.detail||"").toLowerCase().includes(q)
          || (h.user||"").toLowerCase().includes(q);
      })
    : history;

  function formatDate(iso) {
    try { return new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    catch(e) { return iso; }
  }

  var actionColors = {
    "Connexion": C.green, "Déconnexion": C.muted, "Création": C.accent,
    "Suppression": C.red, "Modification": C.yellow, "Import": C.purple,
    "Export": C.green, "Intervention": C.accent, "Réparation": C.green
  };
  function getColor(action) {
    for (var key in actionColors) {
      if (action && action.includes(key)) return actionColors[key];
    }
    return C.muted;
  }

  return React.createElement("div",
    {style:{position:"fixed",inset:0,background:"rgba(15,23,42,0.92)",backdropFilter:"blur(4px)",zIndex:9800,overflowY:"auto",padding:16}},
    React.createElement("div",{style:{maxWidth:900,margin:"0 auto"}},

      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontFamily:"monospace",fontSize:17,fontWeight:800,color:C.accent,letterSpacing:2}},"HISTORIQUE DES MODIFICATIONS"),
          React.createElement("div",{style:{fontSize:11,color:C.muted}},filtered.length+" entrées — Traçabilité complète")
        ),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("button",{
            onClick:function(){
              var csv = "Date,Utilisateur,Action,Détail\n" + history.map(function(h){
                return [formatDate(h.ts),h.user,h.action,h.detail].map(function(v){return '"'+(v||"").replace(/"/g,'""')+'"';}).join(",");
              }).join("\n");
              var a = document.createElement("a");
              a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
              a.download = "HydroFlowEBK_historique_"+new Date().toISOString().slice(0,10)+".csv";
              a.click();
            },
            style:{padding:"6px 12px",background:C.green+"22",border:"1px solid "+C.green+"44",borderRadius:6,color:C.green,fontSize:11,fontWeight:700,cursor:"pointer"}
          },"Export CSV"),
          React.createElement("button",{onClick:onClose,style:{padding:"6px 14px",background:C.surface,border:"1px solid "+C.border,borderRadius:6,color:C.muted,cursor:"pointer",fontWeight:700}},"Fermer")
        )
      ),

      // Filtre
      React.createElement("div",{style:{marginBottom:14}},
        React.createElement("input",{type:"text",value:filter,onChange:function(e){setFilter(e.target.value);},
          placeholder:"Filtrer par action, utilisateur, détail...",
          style:{width:"100%",padding:"8px 14px",background:C.card,border:"1px solid "+C.border,color:C.text,borderRadius:8,fontSize:12,outline:"none"}
        })
      ),

      // Liste
      React.createElement("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:10,overflow:"hidden"}},
        filtered.length === 0
          ? React.createElement("div",{style:{textAlign:"center",padding:"32px",color:C.muted,fontSize:12}},"Aucune entrée dans l'historique.")
          : React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11}},
              React.createElement("thead",null,
                React.createElement("tr",{style:{background:C.surface}},
                  ["Date","Utilisateur","Action","Détail"].map(function(h){
                    return React.createElement("th",{key:h,style:{padding:"10px 12px",textAlign:"left",color:C.muted,fontWeight:600,borderBottom:"1px solid "+C.border}},h);
                  })
                )
              ),
              React.createElement("tbody",null,
                filtered.slice(0,200).map(function(h,i){
                  var col = getColor(h.action||"");
                  return React.createElement("tr",{key:i,style:{borderBottom:"1px solid "+C.border+"22"}},
                    React.createElement("td",{style:{padding:"8px 12px",color:C.muted,whiteSpace:"nowrap"}},formatDate(h.ts)),
                    React.createElement("td",{style:{padding:"8px 12px",fontWeight:600,color:C.text}},h.user||"—"),
                    React.createElement("td",{style:{padding:"8px 12px"}},
                      React.createElement("span",{style:{padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,background:col+"22",color:col}},h.action||"—")
                    ),
                    React.createElement("td",{style:{padding:"8px 12px",color:C.muted,maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},h.detail||"—")
                  );
                })
              )
            )
      )
    )
  );
}

function AnalyseAvanceeTab(props) {

  var tabs = [
    {id:"score",       label:"Score Santé",        icon:"🏆"},
    {id:"coutFuites",  label:"Coût Fuites",         icon:"💰"},

    {id:"prevision",   label:"Prévision 7j",         icon:"📈"},
    {id:"horaire",     label:"Profil 24h",           icon:"⏱️"},
    {id:"saisons",     label:"Saisons",              icon:"🌿"},
    {id:"delai",       label:"Délais Répar.",        icon:"🔧"},
    {id:"efficacite",  label:"Efficacité",           icon:"✅"},
    {id:"chaleur",     label:"Carte Chaleur",        icon:"🗺️"},
  ];

  return React.createElement("div",{style:{padding:"0 0 24px"}},

    // Sub-navigation
    React.createElement("div",{style:{display:"flex",gap:0,overflowX:"auto",borderBottom:"1px solid "+C.border,marginBottom:16,background:C.card}},

        }, t.icon+" "+t.label);
      })
    ),

    // Bouton rapport mensuel
    React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:14}},
      React.createElement("button",{
        onClick:function(){ genererRapportMensuel(sector, currentUser); },
        style:{padding:"8px 18px",background:C.accent+"22",border:"1px solid "+C.accent+"44",borderRadius:8,color:C.accent,fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}
      },"📄 Rapport Mensuel")
    ),

    // Contenu
    subTab==="score"      && React.createElement(ScoreSante,              {sector:sector}),
    subTab==="coutFuites" && React.createElement(CoutFuites,              {sector:sector}),
    subTab==="anomalies"  && React.createElement(AnomaliesPanel,          {sector:sector}),
    subTab==="prevision"  && React.createElement(Prevision7j,             {sector:sector, type:"debit"}),
    subTab==="horaire"    && React.createElement(AnalyseHoraire,          {sector:sector, type:"debit"}),
    subTab==="saisons"    && React.createElement(ComparaisonSaisons,      {sector:sector, type:"debit"}),
    subTab==="delai"      && React.createElement(DelaiReparation,         {sector:sector}),
    subTab==="efficacite" && React.createElement(EfficaciteInterventions, {sector:sector, interventions:interventions}),
    subTab==="chaleur"    && React.createElement(CarteChalleurFuites,     {sector:sector})
  );
}



}; // fin __SONEDE_APP__

  window.__SONEDE_APP_READY__ = function() {
    // Vérifier tous les SDKs nécessaires
    if (typeof React === 'undefined' ||
        typeof ReactDOM === 'undefined' ||
        typeof Recharts === 'undefined' ||
        typeof XLSX === 'undefined') {
      setTimeout(window.__SONEDE_APP_READY__, 150);
      return;
    }

    // Initialiser Firebase et lancer l'app
    if (!window.__FIREBASE_READY__) {
      try {
        window.__FIREBASE_INIT__();
      } catch(e) {
        console.warn('[SONEDE] Firebase init error:', e);
        // Fallback localStorage si Firebase échoue
        window.storage = {
          get: async function(k) {
            var v = null;
            try { v = localStorage.getItem(k); } catch(e) {}
            if (!v) throw new Error('not found');
            return {key:k, value:v};
          },
          set: async function(k,v) {
            try { localStorage.setItem(k,v); } catch(e) {}
            return {key:k, value:v};
          },
          delete: async function(k) {
            try { localStorage.removeItem(k); } catch(e) {}
            return {key:k, deleted:true};
          },
          list: async function(p) {
            try { return {keys: Object.keys(localStorage).filter(function(k){return k.startsWith(p||'');})}; }
            catch(e) { return {keys:[]}; }
          },
          listenRealtime: function(k,cb) { return function(){}; /* polling non disponible hors-ligne */ }
        };
        window.__FIREBASE_READY__ = true;
      }
    }

    window.__SONEDE_APP__();
  };

  </script>
