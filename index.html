  <script>
  (function() {
    var link = document.createElement('link');
    link.rel = 'icon'; link.href = 'data:,';
    document.head.appendChild(link);

    var isWeb = window.location.protocol === 'https:' || window.location.protocol === 'http:';

    // ORDRE CRITIQUE : Firebase EN PREMIER, puis React
    var LIBS = [
      // React
      {local: 'react.js',
       cdn: 'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
       fallback: 'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js'},

       fallback: 'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js'},
      {local: null,
       cdn: 'https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js',
       fallback: 'https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js'},
      {local: 'recharts.js',
       cdn: 'https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js',
       fallback: null},
      {local: 'xlsx.js',
       cdn: 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
       fallback: 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'},
      {local: null,
       cdn: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
       fallback: 'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'},
    ];

    function loadScript(src, onload, onerror) {
      if (!src) { if(onerror) onerror(); return; }
      var s = document.createElement('script');
      s.src = src;
      s.onload = onload;
      s.onerror = onerror || onload;
      document.head.appendChild(s);
    }

    function tryLoad(src, fallback, next) {
      loadScript(src, next, function() {
        /* CDN switch — normal en déploiement cloud */
        if (fallback) {
          loadScript(fallback, next, function() {
            /* fallback CDN failed — silencieux */
            next();
          });
        } else {
          next();
        }
      });
    }

    function loadNext(i) {
      if (i >= LIBS.length) {
        // Tout chargé → lancer l'app
        if (typeof window.__SONEDE_APP_READY__ === 'function') window.__SONEDE_APP_READY__();
        return;
      }
      var lib = LIBS[i];
      var next = function() { loadNext(i + 1); };

      if (isWeb || !lib.local) {
        tryLoad(lib.cdn, lib.fallback, next);
        return;
      }
      loadScript(lib.local, next, function() {
        /* CDN fallback actif — normal en déploiement cloud */
        tryLoad(lib.cdn, lib.fallback, next);
      });
    }

    loadNext(0);
  })();
  </script>
  <script>
  window.__FIREBASE_INIT__ = function() {

    // ── localStorage helper (toujours disponible) ────────────────────────────
    var _mem = {};
    var _lsOk = (function(){
      try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }
      catch(e) { return false; }
    })();
    function lsGet(k){ try{ return _lsOk ? localStorage.getItem(k) : (_mem[k]||null); }catch(e){ return _mem[k]||null; } }
    function lsSet(k,v){ try{ if(_lsOk) localStorage.setItem(k,v); else _mem[k]=v; }catch(e){ _mem[k]=v; } }
    function lsDel(k){ try{ if(_lsOk) localStorage.removeItem(k); else delete _mem[k]; }catch(e){ delete _mem[k]; } }
    function lsKeys(p){ try{ var ks=_lsOk?Object.keys(localStorage):Object.keys(_mem); return ks.filter(function(k){ return k.startsWith(p||''); }); }catch(e){ return []; } }

    // ── Badge de sync ──────────────────────────────────────────────────────────
    function showSyncBadge(msg, color) {
      var badge = document.getElementById('sync-badge');
      if (!badge) {
        badge = document.createElement('div');
        badge.id = 'sync-badge';
        badge.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:9999;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;font-family:monospace;transition:opacity 0.5s;pointer-events:none;';
        document.body.appendChild(badge);
      }
      badge.textContent = msg;
      badge.style.background = color==='green'?'rgba(16,185,129,0.15)':color==='red'?'rgba(239,68,68,0.15)':'rgba(14,165,233,0.15)';
      badge.style.border = '1px solid '+(color==='green'?'#10B981':color==='red'?'#EF4444':'#0EA5E9');
      badge.style.color  = color==='green'?'#10B981':color==='red'?'#EF4444':'#0EA5E9';
      badge.style.opacity = '1';
      clearTimeout(badge._t);
      badge._t = setTimeout(function(){ badge.style.opacity='0'; }, 2500);
    }

    // ── Configuration Firebase ────────────────────────────────────────────────
    var PROJECT_ID = 'sonede-ee-rdf';
    var API_KEY    = 'AIzaSyBI2NgY-S0FzYFb_xi24H58bkdfZnV0zUQ';
    var COL        = 'sonede_storage';

    // ── REST API Firestore (pas de SDK stream, zéro WebChannel) ──────────────
    // On utilise l'API REST Firestore directement via fetch()
    // Ceci évite COMPLÈTEMENT l'ouverture de streams WebChannel/WebSocket

    var REST_BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents/' + COL;

    function safeDocId(k) {
      return k.replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 100);
    }

    var _online = true;  // présumé online jusqu'à preuve du contraire

    // GET via REST
    async function restGet(key) {
      var url = REST_BASE + '/' + safeDocId(key) + '?key=' + API_KEY;
      var r = await fetch(url, { method: 'GET' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var data = await r.json();
      if (!data.fields || !data.fields.value) throw new Error('not found');
      return data.fields.value.stringValue || null;
    }

    // SET via REST (PATCH)
    async function restSet(key, value) {
      var url = REST_BASE + '/' + safeDocId(key) + '?key=' + API_KEY + '&updateMask.fieldPaths=value&updateMask.fieldPaths=updatedAt';
      var body = {
        fields: {
          value:     { stringValue: value },
          updatedAt: { stringValue: new Date().toISOString() }
        }
      };
      var r = await fetch(url, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
    }

    // DELETE via REST
    async function restDelete(key) {
      var url = REST_BASE + '/' + safeDocId(key) + '?key=' + API_KEY;
      await fetch(url, { method: 'DELETE' });
    }

    // ── STORAGE API publique ──────────────────────────────────────────────────
    window.storage = {

      get: async function(key) {
        // 1. Essai REST Firestore
        if (_online) {
          try {
            var val = await restGet(key);
            if (val !== null) {
              lsSet(key, val);
              return { key: key, value: val };
            }
          } catch(e) {
            if (e.message && e.message.indexOf('404') >= 0) {
              // Document n'existe pas — pas une erreur réseau
            } else {
              _online = false;  // marquer offline silencieusement
            }
          }
        }
        // 2. Fallback localStorage
        var lv = lsGet(key);
        if (lv === null) throw new Error('not found');
        return { key: key, value: lv };
      },

      set: async function(key, value) {
        // Sauvegarder localement en premier (immédiat)
        lsSet(key, value);
        // Sync cloud en arrière-plan (silencieux)
        if (_online) {
          restSet(key, value).then(function() {
            showSyncBadge('Synchronisé', 'green');
          }).catch(function() {
            _online = false;
            showSyncBadge('Sauvegardé', 'green');
          });
        } else {
          showSyncBadge('Sauvegardé', 'green');
        }
        return { key: key, value: value };
      },

      delete: async function(key) {
        lsDel(key);
        if (_online) { restDelete(key).catch(function() {}); }
        return { key: key, deleted: true };
      },

      list: async function(prefix) {
        return { keys: lsKeys(prefix) };
      },

      // Polling léger (15s) sans WebChannel
      listenRealtime: function(key, callback) {
        var lastVal = lsGet(key);
        var active  = true;
        var iv = setInterval(function() {
          if (!active) { clearInterval(iv); return; }
          window.storage.get(key)
            .then(function(r) {
              if (r && r.value !== lastVal) {
                lastVal = r.value;
                try { callback(r.value); } catch(e) {}
              }
            })
            .catch(function() {});
        }, 15000);
        return function() { active = false; clearInterval(iv); };
      }
    };

    window.__FIREBASE_READY__ = true;
  };

  
  </script>

// ─── HELPER: localStorage sécurisé (résiste au Tracking Prevention) ─────────
var _appMem = {};
function safeLsGet(k){ try{var v=localStorage.getItem(k); return v;}catch(e){return _appMem[k]||null;} }
function safeLsSet(k,v){ try{localStorage.setItem(k,v);}catch(e){_appMem[k]=v;} }
function safeLsGetJSON(k,def){ try{var v=safeLsGet(k); return v?JSON.parse(v):def;}catch(e){return def;} }

// ─── HELPER: find delegation for a secteur name ──────────────────────────────
function getDelegForSecteur(secteurName) {
  if (!secteurName) return '';
  const norm = secteurName.toLowerCase().trim();
  for (const [deleg, secteurs] of Object.entries(TATAOUINE_SECTEURS)) {
    if (secteurs.some(s => s.toLowerCase().trim() === norm || norm.includes(s.toLowerCase().trim()) || s.toLowerCase().trim().includes(norm))) return deleg;
  }
  return 'Autres';
}

function CarteFuitesRDF({ onClose }) {
  const mapRef = React.useRef(null);
  const leafletMapRef = React.useRef(null);
  const [filterAnnee, setFilterAnnee] = React.useState('all');
  const [filterType, setFilterType] = React.useState('');
  const [filterRepare, setFilterRepare] = React.useState('');
  const [customData] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('sonede_rdf_custom')||'[]'); } catch(e){return[];}
  });

  const allData = [...ALL_RDF_DATA, ...customData];
  const filteredData = allData.filter(r => {
    if (!r.lat || !r.lng) return false;
    if (filterAnnee !== 'all' && String(r.annee) !== filterAnnee) return false;
    if (filterType && r.type !== filterType) return false;
    if (filterRepare === '1' && !r.repare) return false;
    if (filterRepare === '0' && r.repare) return false;
    return true;
  });

  React.useEffect(() => {
    if (!mapRef.current || leafletMapRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([32.93, 10.45], 9);
    (function() {
      var primaryTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 18, className: 'map-tiles'
      });
      var fallbackTile = L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 18
      });
      primaryTile.on('tileerror', function() {
        if (map && !map._fallbackApplied) {
          map._fallbackApplied = true;
          primaryTile.remove();
          fallbackTile.addTo(map);
        }
      });
      primaryTile.addTo(map);
    })();
    leafletMapRef.current = map;
    return () => { if (leafletMapRef.current) { leafletMapRef.current.remove(); leafletMapRef.current = null; } };
  }, []);

  React.useEffect(() => {
    const map = leafletMapRef.current;
    if (!map) return;
    map.eachLayer(l => { if (l instanceof L.CircleMarker || l instanceof L.Marker) map.removeLayer(l); });
    const typeColors = {
      'Branchement': '#F59E0B', 'Conduite': '#EF4444', 'Collier de prise': '#8B5CF6',
      'Vanne': '#0EA5E9', 'Erreur': '#888', 'Fraude': '#ff6b35', 'Autre': '#10B981'
    };
    filteredData.forEach(r => {
      const col = typeColors[r.type] || '#0EA5E9';
      const opacity = r.repare ? 0.5 : 1;
      const moisNames = ['','Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
      L.circleMarker([r.lat, r.lng], {
        radius: 7, color: col, fillColor: col, fillOpacity: opacity, weight: 2
      }).bindPopup(`<div style="font-size:12px;min-width:180px">
        <b style="color:${col}">${r.type || 'Inconnu'}</b><br/>
        <b>${r.secteur || ''}</b><br/>
        📅 ${r.date || ''} — ${moisNames[r.mois]||''} ${r.annee}<br/>
        🔧 ${r.repare ? '<span style="color:#10B981">Réparé</span>' : '<span style="color:#EF4444">Non réparé</span>'}<br/>
        💧 Économie: ${r.economie || 0} l/s<br/>
        ${r.methode ? '🛠 ' + r.methode + '<br/>' : ''}
        ${r.obs ? '📝 ' + r.obs : ''}
      </div>`).addTo(map);
    });
  }, [filteredData]);

  const types = [...new Set(ALL_RDF_DATA.map(r=>r.type).filter(Boolean))];
  const withGPS = allData.filter(r=>r.lat&&r.lng).length;

  return React.createElement('div', {style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:2000,display:'flex',flexDirection:'column'}},
    React.createElement('div', {style:{background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',padding:'10px 16px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},
      React.createElement('div', {style:{fontSize:14,fontWeight:700,color:'#0EA5E9',fontFamily:'monospace'}}, '🗺️ CARTE FUITES RDF — TATAOUINE'),
      React.createElement('select', {value:filterAnnee,onChange:e=>setFilterAnnee(e.target.value),style:{padding:'4px 8px',background:'#FFFFFF',border:'1px solid #E2E8F0',color:'#1E293B',borderRadius:6,fontSize:11}},
        React.createElement('option',{value:'all'},'Toutes années'),
        React.createElement('option',{value:'2025'},'2025'),
        React.createElement('option',{value:'2026'},'2026')
      ),
      React.createElement('select', {value:filterType,onChange:e=>setFilterType(e.target.value),style:{padding:'4px 8px',background:'#FFFFFF',border:'1px solid #E2E8F0',color:'#1E293B',borderRadius:6,fontSize:11}},
        React.createElement('option',{value:''},'Tous types'),
        ...types.map(t=>React.createElement('option',{key:t,value:t},t))
      ),
      React.createElement('select', {value:filterRepare,onChange:e=>setFilterRepare(e.target.value),style:{padding:'4px 8px',background:'#FFFFFF',border:'1px solid #E2E8F0',color:'#1E293B',borderRadius:6,fontSize:11}},
        React.createElement('option',{value:''},'Tous statuts'),
        React.createElement('option',{value:'1'},'✓ Réparées'),
        React.createElement('option',{value:'0'},'✗ Non réparées')
      ),
      React.createElement('span',{style:{fontSize:11,color:'#64748B'}},`${filteredData.length} fuites affichées`),
      React.createElement('div',{style:{marginLeft:'auto',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        [['#F59E0B','Branchement'],['#EF4444','Conduite'],['#8B5CF6','Collier'],['#0EA5E9','Vanne'],['#ff6b35','Fraude']].map(([c,l])=>
          React.createElement('span',{key:l,style:{fontSize:10,color:c,display:'flex',alignItems:'center',gap:3}},

        React.createElement('button',{onClick:onClose,style:{padding:'4px 14px',background:'#F8FAFC',border:'1px solid #E2E8F0',color:'#64748B',borderRadius:6,cursor:'pointer',fontWeight:700}}, '✕ Fermer')
      )

    React.createElement('div', {ref:mapRef, style:{flex:1}})

    try { return JSON.parse(localStorage.getItem('sonede_rdf_custom')||'[]'); } catch(e){return[];}
  });
  // Charger depuis Firestore au montage
  React.useEffect(() => {
    window.storage.get('sonede_rdf_custom').then(r => {
      if (r && r.value) { try { setCustomData(JSON.parse(r.value)); } catch(e){} }
    }).catch(()=>{});

    mois: new Date().getMonth()+1, annee: 2026,
    secteur:'', delegation:'', type:'Branchement',
    kmDetectes:'', economie:'', repare:1,
    methode:'Géophone', mission:'R', obs:''
  });

  // RDFDashboard affiche TOUTES les données (pas de filtre secteur)
  const allData = React.useMemo(() => {
    return [...ALL_RDF_DATA, ...customData];
  }, [customData]);

  const filteredData = allData.filter(r => {

    if (filterMois && r.mois !== parseInt(filterMois)) return false;

// ─── COMPOSANT: GESTIONNAIRE SECTEURS ────────────────────────────────────────
function SecteurManager({ onClose }) {
  const [data, setData] = React.useState(() => {
    try {
      const saved = localStorage.getItem('sonede_secteurs_custom');
      return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(TATAOUINE_SECTEURS));
    } catch(e) { return JSON.parse(JSON.stringify(TATAOUINE_SECTEURS)); }
  });
  const [selDeleg, setSelDeleg] = React.useState(Object.keys(data)[0]||'');

  // Charger depuis Firestore au montage
  React.useEffect(() => {
    window.storage.get('sonede_secteurs_custom').then(r => {
      if (r && r.value) {
        try {
          const parsed = JSON.parse(r.value);
          setData(parsed);
          setSelDeleg(Object.keys(parsed)[0]||'');
          localStorage.setItem('sonede_secteurs_custom', r.value);
        } catch(e) {}
      }
    }).catch(()=>{});
  }, []);
  const [editDeleg, setEditDeleg] = React.useState(null);
  const [editSecteur, setEditSecteur] = React.useState(null);
  const [newDelegName, setNewDelegName] = React.useState('');
  const [newSecteurName, setNewSecteurName] = React.useState('');
  const [msg, setMsg] = React.useState('');

  const save = async d => {
    setData(d);
    try {
      await window.storage.set('sonede_secteurs_custom', JSON.stringify(d));
      setMsg('✅ Sauvegardé cloud ☁️');
    } catch(e) {
      try { localStorage.setItem('sonede_secteurs_custom', JSON.stringify(d)); } catch(e2) {}
      setMsg('✅ Sauvegardé local');
    }
    setTimeout(()=>setMsg(''),2500);
  };

  // addDeleg défini dans addSecteur block ci-dessus

  const renameDeleg = (old,nw) => {
    if (!nw.trim()||nw===old){setEditDeleg(null);return;}
    const d={};Object.keys(data).forEach(k=>{d[k===old?nw.trim():k]=data[k];});
    save(d);setSelDeleg(nw.trim());setEditDeleg(null);
  };

  const deleteDeleg = name => {

// ─── FONCTION KPI STATUS COLOR ─────────────────────────────────────────────
function kpiStatusColor(value, warnThreshold, critThreshold, lowerIsBetter = true) {
    if (value === null || value === undefined || isNaN(value)) return C.muted;
    if (lowerIsBetter) {
        if (value <= warnThreshold) return C.green;
        if (value <= critThreshold) return C.yellow;
        return C.red;
    } else {
        if (value >= warnThreshold) return C.green;
        if (value >= critThreshold) return C.yellow;
        return C.red;
    }
}
function kpiStatusBg(value, warnThreshold, critThreshold, lowerIsBetter = true) {
    const col = kpiStatusColor(value, warnThreshold, critThreshold, lowerIsBetter);
    return col + '18';
}
function kpiStatusLabel(value, warnThreshold, critThreshold, lowerIsBetter = true) {
    if (value === null || value === undefined || isNaN(value)) return '';
    const col = kpiStatusColor(value, warnThreshold, critThreshold, lowerIsBetter);
    if (col === C.green)  return 'Conforme';
    if (col === C.yellow) return 'Attention';
    return 'Critique';
}

// ─── CONVERSION UNITÉS ────────────────────────────────────────────────────────
function convertDebit(val, fromUnit, toUnit) {
    if (val == null || isNaN(val)) return val;
    // Convert to l/s first
    let ls = val;
    if (fromUnit === "m³/h") ls = val * 1000 / 3600;
    else if (fromUnit === "m³/s") ls = val * 1000;
    else if (fromUnit === "l/h") ls = val / 3600;
    else if (fromUnit === "m³/min") ls = val * 1000 / 60;
    // Convert from l/s to target
    if (toUnit === "l/s") return +ls.toFixed(4);
    if (toUnit === "m³/h") return +(ls * 3600 / 1000).toFixed(4);
    if (toUnit === "m³/s") return +(ls / 1000).toFixed(6);
    if (toUnit === "l/h") return +(ls * 3600).toFixed(2);
    return +ls.toFixed(4);
}
function convertPression(val, fromUnit, toUnit) {
    if (val == null || isNaN(val)) return val;
    // Convert to bar first
    let bar = val;
    if (fromUnit === "mCE" || fromUnit === "mca" || fromUnit === "mce") bar = val * 0.0980665;
    else if (fromUnit === "kPa") bar = val * 0.01;
    else if (fromUnit === "psi") bar = val * 0.0689476;
    else if (fromUnit === "MPa") bar = val * 10;
    else if (fromUnit === "Pa") bar = val / 100000;
    // Convert from bar to target
    if (toUnit === "bar") return +bar.toFixed(4);
    if (toUnit === "mCE") return +(bar / 0.0980665).toFixed(3);
    if (toUnit === "kPa") return +(bar * 100).toFixed(3);
    if (toUnit === "psi") return +(bar / 0.0689476).toFixed(3);
    return +bar.toFixed(4);
}

// ─── UTILITAIRES ──────────────────────────────────────────────────────────────
function fmtDate(v) {
    if (!v)
        return "—";
    if (v instanceof Date)
        return v.toLocaleDateString("fr-FR");
    if (typeof v === "number")
        return new Date(Math.round((v - 25569) * 86400000)).toLocaleDateString("fr-FR");
    return String(v).split("T")[0];
}
function fmtTime(v) {
    if (v == null || v === "")
        return "";
    if (v instanceof Date)
        return v.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    if (typeof v === "number") {
        const h = Math.floor(v * 24), m = Math.floor((v * 24 - h) * 60);
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    }
    return String(v).slice(0, 5);
}
function detectTimestep(rows) {
    if (!rows || rows.length < 3)
        return null;
    const times = rows.slice(0, 20).map(r => r.rawTime).filter(t => t != null && typeof t === "number");
    if (times.length < 2)
        return null;
    const diffs = [];
    for (let i = 1; i < times.length; i++) {
        const d = Math.round((times[i] - times[i - 1]) * 24 * 60);
        if (d > 0 && d < 1440)
            diffs.push(d);
    }
    if (!diffs.length)
        return null;
    const counts = {};
    diffs.forEach(d => { counts[d] = (counts[d] || 0) + 1; });
    return +Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
}
function detectUnit(headers) {
    const h = headers.join(" ").toLowerCase();
    if (h.includes("m3/h") || h.includes("m³/h"))
        return "m³/h";
    if (h.includes("m3/s") || h.includes("m³/s"))
        return "m³/s";
    if (h.includes("l/h"))
        return "l/h";
    if (h.includes("l/s"))
        return "l/s";
    return "l/s";
}
function detectPressureUnit(headers) {
    const h = headers.join(" ").toLowerCase();
    if (h.includes("mce") || h.includes("mca"))
        return "mCE";
    if (h.includes("psi"))
        return "psi";
    if (h.includes("kpa"))
        return "kPa";
    return "bar";
}
function detectPeriod(rows) {
    const dates = rows.map(r => r.rawDate || r.rawTime).filter(v => v != null);
    if (!dates.length)
        return null;
    const toMs = v => {
        if (v instanceof Date)
            return v.getTime();
        if (typeof v === "number")
            return Math.round((v - 25569) * 86400000);
        return null;
    };
    const ms = dates.map(toMs).filter(Boolean);
    if (!ms.length)
        return null;
    const min = new Date(Math.min(...ms)), max = new Date(Math.max(...ms));
    return { debut: min.toLocaleDateString("fr-FR"), fin: max.toLocaleDateString("fr-FR") };
}

function processDebit(sheets) {
    try {
        const sheetKey = Object.keys(sheets).find(k => k.toLowerCase().includes("débit") || k.toLowerCase().includes("debit") ||
            k.toLowerCase().includes("flow") || k.toLowerCase().includes("data")) || Object.keys(sheets)[0];
        const s = sheets[sheetKey] || [];
        let hr = 0;
        for (let i = 0; i < 10; i++) {
            const row = s[i] || [];
            if (row.some(c => c != null && typeof c === "string" && (c.toLowerCase().includes("heure") || c.toLowerCase().includes("time") ||
                c.toLowerCase().includes("date") || c.toLowerCase().includes("débit") || c.toLowerCase().includes("debit")))) {
                hr = i;
                break;
            }
        }
        const hd = s[hr] || [];
        const allHeaders = hd.map(h => h != null ? String(h) : "");
        const unit = detectUnit(allHeaders);
        const hiDate = hd.findIndex(h => h && String(h).toLowerCase().includes("date"));
        const hiHeure = hd.findIndex(h => h && (String(h).toLowerCase().includes("heure") || String(h).toLowerCase().includes("time")));
        const hiTotal = hd.findIndex(h => h && (String(h).toLowerCase().includes("total") || String(h).toLowerCase().includes("sum")));
        const startIdx = Math.max(hiDate, hiHeure, 0) + 1;
        const numCols = hd.map((h, i) => ({ h: h || `Col${i}`, i })).filter(({ i }) => i >= startIdx);
        const rows = [];
        for (let i = hr + 1; i < s.length; i++) {
            const r = s[i];
            if (!r)
                continue;
            const hasNum = r.some((v, idx) => idx >= startIdx && v != null && typeof v === "number");
            if (!hasNum)
                continue;
            const point = {
                rawDate: hiDate >= 0 ? r[hiDate] : null,
                rawTime: hiHeure >= 0 ? r[hiHeure] : (hiDate >= 0 ? r[hiDate] : null),
                time: fmtTime(hiHeure >= 0 ? r[hiHeure] : r[hiDate])
            };
            numCols.forEach(({ h, i: ci }) => { if (r[ci] != null && typeof r[ci] === "number")
                point[h] = +r[ci].toFixed(3); });
            const totalKey = hiTotal >= 0 ? (hd[hiTotal] || "Total") : null;
            const vals = numCols.map(({ i: ci }) => r[ci]).filter(v => typeof v === "number" && v >= 0);
            point.Total = totalKey && point[totalKey] != null ? point[totalKey] : (vals.length ? +Math.max(...vals).toFixed(3) : null);
            if (point.Total == null)
                continue;
            rows.push(point);
        }
        const step = detectTimestep(rows);
        const period = detectPeriod(rows);
        const totals = rows.map(r => r.Total).filter(v => v > 0);
        const colNames = numCols.map(({ h }) => h).filter(h => !h.toLowerCase().includes("date"));
        // Convert all numeric columns to l/s
        const targetUnit = "l/s";
        if (unit !== targetUnit) {
            rows.forEach(row => {
                colNames.forEach(col => {
                    if (row[col] != null) row[col] = convertDebit(row[col], unit, targetUnit);
                });
                if (row.Total != null) row.Total = convertDebit(row.Total, unit, targetUnit);
            });
        }
        const convertedTotals = rows.map(r => r.Total).filter(v => v > 0);
        return {
            flowData: rows, sheetName: sheetKey, unit: "l/s", timestep: step, period,
            colNames: colNames.slice(0, 6),
            stats: {
                mnf: convertedTotals.length ? Math.min(...convertedTotals).toFixed(3) : null,

                maxFlow: convertedTotals.length ? Math.max(...convertedTotals).toFixed(3) : null,
                pointCount: rows.length, unit: "l/s", originalUnit: unit

function RDFTab({ sector, onFile }) {
    const sectorName = sector.name || "Ce secteur";
    const sectorNameLower = sector.name ? sector.name.toLowerCase().trim() : '';
    const storageKey = "rdf_fuites_" + sector.id;

    const [fuites, setFuites] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem(storageKey) || "[]"); }
        catch(e) { return []; }
    });
    const [showForm, setShowForm] = React.useState(false);
    const [editIdx, setEditIdx] = React.useState(null);
    const [filterMois, setFilterMois] = React.useState("");
    const [filterType, setFilterType] = React.useState("");
    const [filterRepare, setFilterRepare] = React.useState("");
    const emptyFuite = {
        mois: new Date().getMonth()+1, annee: new Date().getFullYear(),
        date: "", nPolice: "", localisation: "", type: "Branchement",
        kmDetectes: "", economie: "", repare: "0",
        delais: "", dn: "", materiau: "", methode: "Géophone",
        mission: "R", obs: ""
    };
    const [form, setForm] = React.useState(emptyFuite);

    const saveFuites = (data) => {
        setFuites(data);
        localStorage.setItem(storageKey, JSON.stringify(data));
    };

    const submitForm = () => {
        const f = {
            ...form,
            id: editIdx !== null ? fuites[editIdx].id : Date.now(),
            kmDetectes: parseFloat(form.kmDetectes) || 0,
            economie: parseFloat(form.economie) || 0,
            delais: parseInt(form.delais) || null,
            mois: parseInt(form.mois) || 1,
            annee: parseInt(form.annee) || new Date().getFullYear(),
            repare: parseInt(form.repare) || 0,
            secteur: sectorName
        };
        if (editIdx !== null) {
            const updated = [...fuites];
            updated[editIdx] = f;
            saveFuites(updated);
        } else {
            saveFuites([...fuites, f]);
        }
        setShowForm(false);
        setEditIdx(null);
        setForm(emptyFuite);
    };

    const editFuite = (idx) => {
        const f = fuites[idx];
        setForm({...emptyFuite, ...f, repare: String(f.repare||0), mois: String(f.mois||1), annee: String(f.annee||2026), kmDetectes: String(f.kmDetectes||""), economie: String(f.economie||""), delais: String(f.delais||"")});
        setEditIdx(idx);
        setShowForm(true);
    };

  const save = (next)=>{setPhotos(next);localStorage.setItem(storKey,JSON.stringify(next));};

  const extractDriveId = (url) => {
    const m = url.match(/\/d\/([a-zA-Z0-9_-]{10,})/)||url.match(/id=([a-zA-Z0-9_-]{10,})/)||url.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);

  const addDrivePhoto = () => {
    const fid = extractDriveId(driveInput);

    if (photos.find(p=>p.fileId===fid)) { alert("Cette photo est déjà ajoutée."); return; }

      React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:8}},"Collez le(s) lien(s) de partage Google Drive (un par ligne ou séparés par virgule) ·  Fichier → Partager → Copier le lien"),

// ─── ONGLET PERFORMANCE (TABLEAU DE BORD AVANCÉ) ─────────────────────────────
function PerformanceTab({ sector, interventions }) {
  const ds = sector.data?.debit?.stats;
  const ps = sector.data?.pression?.stats;
  const fs = sector.data?.fuites?.stats;
  const km = (sector.data?.reseau?.totalKm)||sector.kmReseau;
  const rdfData = (sector.data?.fuites?.fuites?.length>0)?sector.data.fuites.fuites:TATAOUINE_RDF_DATA;
  const rdfRep = rdfData.filter(r=>r.repare===1||r.repare===true||(r.dateRepair&&r.dateRepair!=="—")).length;
  const rdfTotal = rdfData.length;

// ─── FETCH MULTI-STRATÉGIES (file:// compatible) ──────────────────────────────
// Stratégie 1 : JSONP — gviz supporte nativement le callback=xxx → zéro CORS
// Stratégie 2 : fetch direct (fonctionne sur serveur HTTPS)
// Stratégie 3 : corsproxy.io
// Stratégie 4 : allorigins.win

function _fetchWithTimeout(url, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  return fetch(url, { cache: 'no-store', signal: ctrl.signal })
    .finally(() => clearTimeout(timer));
}

// JSONP : injecte un script tag — fonctionne depuis file:// sans restriction CORS
// ─── JSONP gviz ───────────────────────────────────────────────────────────────
// Google Sheets gviz/tq avec tqx=out:json IGNORE le paramètre callback et appelle
// toujours  google.visualization.Query.setResponse({...})
// → on intercepte cet appel en shimant l'objet global google avant d'injecter le script.
function _fetchGvizJSONP(sheetId, timeoutMs) {
  return new Promise(function(resolve, reject) {
    var s;
    var done = false;
    var timer = setTimeout(function() {
      if (done) return; done = true;
      if (s && s.parentNode) s.parentNode.removeChild(s);
      // Nettoyer le shim seulement si on l'a mis
      if (window.__gvizShimActive) { delete window.google; delete window.__gvizShimActive; }
      reject(new Error('JSONP timeout'));
    }, timeoutMs);

    // Shim google.visualization.Query.setResponse
    window.__gvizShimActive = true;
    window.google = window.google || {};
    window.google.visualization = window.google.visualization || {};
    window.google.visualization.Query = window.google.visualization.Query || {};
    window.google.visualization.Query.setResponse = function(data) {
      if (done) return; done = true;
      clearTimeout(timer);
      if (s && s.parentNode) s.parentNode.removeChild(s);
      delete window.__gvizShimActive;
      // Ne pas supprimer window.google — d'autres scripts peuvent en avoir besoin
      resolve(data);
    };

    s = document.createElement('script');
    // tqx=out:json → Google retourne google.visualization.Query.setResponse({...})
    s.src = 'https://docs.google.com/spreadsheets/d/' + sheetId +
            '/gviz/tq?tqx=out:json&gid=0&t=' + Date.now();
    s.onerror = function() {
      if (done) return; done = true;
      clearTimeout(timer);
      if (window.__gvizShimActive) { delete window.__gvizShimActive; }
      reject(new Error('JSONP script error — Sheet inaccessible ou non partagé'));
    };
    document.head.appendChild(s);
  });
}

// ─── PROXY CORS multi-fallback ────────────────────────────────────────────────
// Proxy 1 : thingproxy.freeboard.io (supporte file://, pas de CORS strict)
// Proxy 2 : allorigins.win
async function _fetchViaProxy(url, timeoutMs) {
  // Proxy 1 : thingproxy
  try {
    const res1 = await _fetchWithTimeout(
      'https://thingproxy.freeboard.io/fetch/' + url, timeoutMs);
    if (res1.ok) { const t = await res1.text(); if (t && t.length > 10) return t; }
  } catch(ep1) { /* essayer suivant */ }
  // Proxy 2 : allorigins.win
  try {
    const res2 = await _fetchWithTimeout(
      'https://api.allorigins.win/get?url=' + encodeURIComponent(url) + '&t=' + Date.now(),
      timeoutMs);
    if (res2.ok) {
      const j = await res2.json();
      if (j.contents && j.contents.length > 10) return j.contents;
    }
  } catch(ep2) { /* essayer suivant */ }
  // Proxy 3 : htmldriven (très permissif)
  const res3 = await _fetchWithTimeout(
    'https://cors.eu.org/' + url, timeoutMs);
  if (!res3.ok) throw new Error('Tous les proxies ont échoué (HTTP ' + res3.status + ')');
  return await res3.text();
}

// Retourne les données avec les en-têtes réels → compatible AppSheet
function _parseGvizResponse(jsonText) {
  // Retire le wrapper JS : /*O_o*/google.visualization.Query.setResponse({...});
  const clean = jsonText.replace(/^[^(]*\(/, '').replace(/\);\s*$/, '');
  try { return JSON.parse(clean); } catch(e) { return null; }
}

function _normHeader(h) { return (h||'').toLowerCase().trim().replace(/\s+/g,' ').replace(/[_\-]/g,' '); }

function _parseGvizTable(table) {
  if (!table || !table.cols || !table.rows) return [];
  const VALID_CATS = ['Police','Forage','Secteur','Reservoir','Station','Regard','Chambre de Vane','Autre'];

  // Construire l'index des colonnes par nom d'en-tête
  const colMap = {}; // field → index de colonne
  let latIdx = -1, lngIdx = -1;
  table.cols.forEach((col, idx) => {
    const key = _normHeader(col.label || col.id || '');
    const field = HEADER_MAP[key];
    if (field === 'lat_only')  { latIdx = idx; return; }
    if (field === 'lng_only')  { lngIdx = idx; return; }
    if (field && !(field in colMap)) colMap[field] = idx;
  });

  // Fallback positionnel si aucune en-tête reconnue (< 3 champs mappés)
  if (Object.keys(colMap).length < 3) {
    Object.assign(colMap, {cat:0,nom:1,gps:2,imgMain:3,imgDetec:4,date:5,typeFuite:6,methode:7,pr:8,interv:9,ctr:10,index:11,debit:12,pression:13,cote:14});
  }

  const getV = (cells, field) => {
    const idx = colMap[field];
    if (idx === undefined || idx >= cells.length || !cells[idx]) return '';
    const c = cells[idx];
    if (c.v !== null && c.v !== undefined) return String(c.v);
    return c.f || '';
  };

  const rows = [];
  table.rows.forEach((row, i) => {
    const cells = row.c || [];
    let cat = getV(cells, 'cat').trim();
    const nom = getV(cells, 'nom').trim();
    if (!cat && !nom) return;
    if (cat === '$' || /^(cat[ée]gorie|cat\.|nom|libel)/i.test(cat)) return;

    const catNorm = VALID_CATS.find(c => c.toLowerCase() === cat.toLowerCase()) ||
                    VALID_CATS.find(c => cat.toLowerCase().includes(c.toLowerCase().slice(0,4))) ||
                    (cat || 'Autre');

    // GPS : colonne combinée OU colonnes lat/lng séparées
    let lat = null, lng = null;
    if (latIdx >= 0 && lngIdx >= 0) {
      const lv = cells[latIdx], gv = cells[lngIdx];
      if (lv && lv.v !== null) lat = parseFloat(String(lv.v).replace(',','.'));
      if (gv && gv.v !== null) lng = parseFloat(String(gv.v).replace(',','.'));
    } else {
      const coordRaw = getV(cells, 'gps').trim().replace(/(\d),(\d)/g,'$1.$2');
      const m = coordRaw.match(/(-?\d+\.?\d*)[,\s;\/]+(-?\d+\.?\d*)/);
      if (m) { lat = parseFloat(m[1]); lng = parseFloat(m[2]); }
    }
    if (isNaN(lat)) lat = null;
    if (isNaN(lng)) lng = null;

    rows.push({
      id:'gs_'+i, cat:catNorm, nom, lat, lng,
      imgMain:  getV(cells,'imgMain'),
      imgDetec: getV(cells,'imgDetec'),
      date:     getV(cells,'date'),
      typeFuite:getV(cells,'typeFuite'),
      methode:  getV(cells,'methode'),
      pr:       getV(cells,'pr'),
      interv:   getV(cells,'interv'),
      ctr:      getV(cells,'ctr'),
      index:    getV(cells,'index'),
      debit:    getV(cells,'debit').replace(',','.'),
      pression: getV(cells,'pression').replace(',','.'),
      cote:     getV(cells,'cote').replace(',','.'),
      source:'sheets'
    });
  });
  return rows;
}

function parseSheetCSV(csvText) {
  // ── Parser CSV robuste (gère les guillemets, sauts de ligne dans cellules) ──
  const parseLine = (line) => {
    const cols = []; let cur = '', inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') {
        if (inQ && line[c+1] === '"') { cur += '"'; c++; } // guillemet doublé
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  };

  const VALID_CATS = ['Police','Forage','Secteur','Reservoir','Station','Regard','Chambre de Vane','Autre'];
  const lines = csvText.split(/\r?\n/);
  if (lines.length < 2) return [];

  // ── Détection de la ligne d'en-tête et construction du colMap ──
  let headerLine = 0;
  const colMap = {}; // field → index
  let latIdx = -1, lngIdx = -1;
  let usedHeaderMapping = false;

  // Cherche la première ligne qui ressemble à un en-tête (contient des mots-clés connus)
  for (let i = 0; i <= Math.min(2, lines.length-1); i++) {
    const hcols = parseLine(lines[i]);
    let matches = 0;
    hcols.forEach((h, idx) => {
      const key = _normHeader(h);
      const field = HEADER_MAP[key];
      if (field === 'lat_only')  { latIdx = idx; matches++; return; }
      if (field === 'lng_only')  { lngIdx = idx; matches++; return; }
      if (field && !(field in colMap)) { colMap[field] = idx; matches++; }
    });
    if (matches >= 3) { headerLine = i; usedHeaderMapping = true; break; }
  }

  // Fallback positionnel si aucune en-tête reconnue
  if (!usedHeaderMapping) {
    Object.assign(colMap, {cat:0,nom:1,gps:2,imgMain:3,imgDetec:4,date:5,typeFuite:6,methode:7,pr:8,interv:9,ctr:10,index:11,debit:12,pression:13,cote:14});
  }

  const getC = (cols, field) => {
    const idx = colMap[field];
    return (idx !== undefined && idx < cols.length) ? (cols[idx]||'').trim() : '';
  };

  const rows = [];
  for (let i = headerLine + 1; i < lines.length; i++) {
    const line = lines[i]; if (!line.trim()) continue;
    const cols = parseLine(line);
    let cat = getC(cols, 'cat');
    const nom = getC(cols, 'nom');
    if (!cat && !nom) continue;
    if (cat === '$' || /^(cat[ée]gorie|cat\.|nom\b|libel)/i.test(cat)) continue;

    const catNorm = VALID_CATS.find(c => c.toLowerCase() === cat.toLowerCase()) ||
                    VALID_CATS.find(c => cat.toLowerCase().includes(c.toLowerCase().slice(0,4))) ||
                    (cat || 'Autre');

    // ── GPS : colonne combinée OU lat + lng séparées ──
    let lat = null, lng = null;
    if (latIdx >= 0 && lngIdx >= 0) {
      lat = parseFloat((cols[latIdx]||'').replace(',','.'));
      lng = parseFloat((cols[lngIdx]||'').replace(',','.'));
    } else {
      const coordRaw = getC(cols,'gps').replace(/(\d),(\d)/g,'$1.$2');
      const m = coordRaw.match(/(-?\d+\.?\d*)[,\s;\/]+(-?\d+\.?\d*)/);
      if (m) { lat = parseFloat(m[1]); lng = parseFloat(m[2]); }
    }
    if (isNaN(lat)||isNaN(lng)) { lat=null; lng=null; }

    rows.push({ id:'gs_'+i, cat:catNorm, nom, lat, lng,
      imgMain:  getC(cols,'imgMain'),
      imgDetec: getC(cols,'imgDetec'),
      date:     getC(cols,'date'),
      typeFuite:getC(cols,'typeFuite'),

  }
  return rows;
}

  const CACHE_KEY = "sonede_sheet_cache";
  const [data, setData]           = React.useState(()=>{ try{ return JSON.parse(localStorage.getItem(CACHE_KEY)||"[]"); }catch(e){return[];} });
  const [loading, setLoading]     = React.useState(false);
  const [lastSync, setLastSync]   = React.useState(()=>localStorage.getItem("sonede_sheet_sync")||null);
  const [error, setError]         = React.useState(null);
  const [filterCat, setFilterCat] = React.useState("all");
  const [filterPR,  setFilterPR]  = React.useState("all");

  const [viewMode, setViewMode]   = React.useState("table"); // table | carte | stats
  const [selectedRow, setSelectedRow] = React.useState(null);
  const mapRef  = React.useRef(null);
  const mapInst = React.useRef(null);

  // ── Sync Google Sheets — JSONP + proxy multi-fallback (file:// compatible) ──
  // Ordre : JSONP (zéro CORS) → fetch direct → corsproxy.io → allorigins.win
  const syncSheet = async () => {
    setLoading(true); setError(null);
    try {
      let rows = null;
      let method = '';

      // ── Tentative 1 : JSONP gviz (fonctionne depuis file://, zéro CORS) ──
      try {
        const gvizData = await _fetchGvizJSONP(SHEET_ID, SYNC_TIMEOUT_MS);
        if (gvizData && gvizData.status === 'ok' && gvizData.table) {
          rows = _parseGvizTable(gvizData.table);
          method = 'jsonp';
        }
      } catch(e1) { /* JSONP échoué → méthode suivante */ }

      // ── Tentative 2 : fetch direct gviz (si serveur HTTPS) ──
      if (!rows || rows.length === 0) {
        try {
          const res = await _fetchWithTimeout(SHEET_GVZ + '&t=' + Date.now(), SYNC_TIMEOUT_MS);
          if (res.ok) {
            const text = await res.text();
            const gviz = _parseGvizResponse(text);
            if (gviz && gviz.status === 'ok' && gviz.table) {
              rows = _parseGvizTable(gviz.table);
              method = 'gviz-direct';
            }
          }
        } catch(e2) { /* fetch direct bloqué → proxy */ }
      }

      // ── Tentative 3 : gviz via proxy CORS ──
      if (!rows || rows.length === 0) {
        try {
          const text = await _fetchViaProxy(SHEET_GVZ, SYNC_TIMEOUT_MS);
          const gviz = _parseGvizResponse(text);
          if (gviz && gviz.status === 'ok' && gviz.table) {
            rows = _parseGvizTable(gviz.table);
            method = 'gviz+proxy';
          }
        } catch(e3) { /* gviz proxy échoué → CSV proxy */ }
      }

      // ── Tentative 4 : CSV via proxy CORS ──
      if (!rows || rows.length === 0) {
        const text = await _fetchViaProxy(SHEET_CSV, SYNC_TIMEOUT_MS);
        rows = parseSheetCSV(text);
        method = 'csv+proxy';
      }

      if (!rows || rows.length === 0) throw new Error('Aucune donnée lue — Sheet vide ou accès refusé');

      setData(rows);
      localStorage.setItem(CACHE_KEY, JSON.stringify(rows));
      const now = new Date().toLocaleString('fr-FR');
      setLastSync(now + ' [' + method + ']');
      localStorage.setItem('sonede_sheet_sync', now + ' [' + method + ']'); window.storage.set('sonede_sheet_sync', now + ' [' + method + ']').catch(()=>{});
    } catch(e) {
      const msg = e.name === 'AbortError'
        ? 'Délai dépassé (' + (SYNC_TIMEOUT_MS/1000) + 's) — réseau lent ou Sheet inaccessible'
        : e.message;
      setError('❌ Synchronisation échouée : ' + msg + '. Vérifiez que le Sheet est partagé en « Tout le monde avec le lien ».');
    }
    setLoading(false);
  };

  // Auto-sync au premier chargement si le cache est vide

  // ── Filtrage ──

    if (filterCat!=="all" && r.cat!==filterCat) return false;
    if (filterPR!=="all"  && r.pr!==filterPR) return false;
    if (search && !`${r.nom} ${r.cat} ${r.interv} ${r.typeFuite}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[data,filterCat,filterPR,search]);

function DiagnosticGlobalView() {
  const DONE_KEY = "sonede_diag_done";
  const [done, setDone] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem(DONE_KEY)||"{}"); } catch(e) { return {}; }
  });
  const [search, setSearch] = React.useState("");
  const [filterEtat, setFilterEtat] = React.useState("all");
  const [filterOuvrage, setFilterOuvrage] = React.useState("all");
  const [viewMode, setViewMode] = React.useState("table"); // table | carte
  const mapRef2 = React.useRef(null);
  const mapInst2 = React.useRef(null);

  const toggleDone = (id) => {
    const next = { ...done, [id]: !done[id] };
    setDone(next);
    localStorage.setItem(DONE_KEY, JSON.stringify(next));
  };

  const doneCount = DIAG_RECORDS.filter(r => done[r.sheet]).length;

  const getEtatColor = (e) => {
    if (!e) return C.muted;
    const l = e.toLowerCase();
    if (l.includes("bon") || l.includes("bonne")) return C.green;
    if (l.includes("moyen")) return C.yellow;
    if (l.includes("mauvais") || l.includes("reconstru") || l.includes("urgent")) return C.red;
    if (l.includes("non exist") || l.includes("pas d") || l.includes("pas de")) return "#888";
    return C.muted;
  };

  const filtered = React.useMemo(() => DIAG_RECORDS.filter(r => {
    if (filterEtat !== "all") {
      const l = (r.etat_general||"").toLowerCase();
      if (filterEtat === "bon" && !l.includes("bon")) return false;
      if (filterEtat === "moyen" && !l.includes("moyen")) return false;
      if (filterEtat === "mauvais" && !(l.includes("mauvais")||l.includes("reconstru"))) return false;
      if (filterEtat === "nonexist" && !(l.includes("non exist")||l.includes("pas d")||l.includes("pas de"))) return false;
    }
    if (filterOuvrage !== "all") {
      const ov = (r.ouvrage||"").toLowerCase();
      if (filterOuvrage === "regard" && !ov.includes("regard")) return false;
      if (filterOuvrage === "chambre" && !ov.includes("chambre")) return false;
      if (filterOuvrage === "station" && !(ov.includes("station")||ov.includes("surpresseur"))) return false;
      if (filterOuvrage === "reservoir" && !ov.includes("réservoir")) return false;
    }
    if (search) {
      const s = search.toLowerCase();
      if (!`${r.secteur} ${r.localite} ${r.ouvrage} ${r.sheet} ${r.matricule}`.toLowerCase().includes(s)) return false;
    }
    return true;
  }), [search, filterEtat, filterOuvrage]);

  const doneFiltered = filtered.filter(r => done[r.sheet]).length;

  // Carte
  React.useEffect(() => {
    if (viewMode !== "carte" || !mapRef2.current || typeof window.L === "undefined") return;
    if (mapInst2.current) { mapInst2.current.remove(); mapInst2.current = null; }
    const pts = filtered.filter(r => r.x && r.y && !isNaN(parseFloat(r.x)) && !isNaN(parseFloat(r.y)));
    const center = pts.length > 0 ? [pts.reduce((a,r)=>a+parseFloat(r.x),0)/pts.length, pts.reduce((a,r)=>a+parseFloat(r.y),0)/pts.length] : [32.93, 10.45];
    const map = window.L.map(mapRef2.current, {zoomControl:true, scrollWheelZoom:true}).setView(center, 9);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {attribution:"© OpenStreetMap", maxZoom:19}).addTo(map);
    pts.forEach(r => {
      const lat = parseFloat(r.x), lng = parseFloat(r.y);
      const isDone = done[r.sheet];
      const col = isDone ? C.green : getEtatColor(r.etat_general);
      const ico = window.L.divIcon({className:"", html:`<div style="background:${col};width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.8);box-shadow:0 0 6px ${col}99;${isDone?"outline:2px solid #10B981;":""}" title="${r.secteur}"></div>`, iconSize:[12,12], iconAnchor:[6,6]});
      const popup = `<div style="font-size:12px;min-width:220px;line-height:1.8;color:#1E293B;background:#FFFFFF;padding:10px;border-radius:6px">
        <div style="color:${col};font-weight:700;font-size:13px">🏗️ ${r.ouvrage||"Ouvrage"} — ${r.secteur}</div>
        <div>📍 ${r.localite}</div>
        <div>📋 ${r.sheet} · ${r.matricule||"—"}</div>
        <div>🔩 ${r.antenne||"—"} · ${r.dimensions||"—"}</div>
        <div>État: <span style="color:${col};font-weight:700">${r.etat_general||"N/R"}</span></div>
        ${r.debitmetre_etat?`<div>💧 Débimètre: ${r.debitmetre_etat} DN${r.debitmetre_dn}</div>`:""}
        ${r.observations?`<div style="font-size:11px;color:#8ab;margin-top:4px">${r.observations}</div>`:""}
        <div style="margin-top:6px;font-weight:700;color:${isDone?C.green:C.red}">${isDone?"✅ TRAVAIL FAIT":"⏳ TRAVAIL EN ATTENTE"}</div>
      </div>`;
      window.L.marker([lat, lng], {icon:ico}).addTo(map).bindPopup(popup, {maxWidth:300, className:"leaflet-popup-dark"});
    });
    mapInst2.current = map;
    return () => { if(mapInst2.current){mapInst2.current.remove();mapInst2.current=null;} };
  }, [viewMode, filtered, done]);

  const progPct = DIAG_RECORDS.length > 0 ? Math.round(doneCount / DIAG_RECORDS.length * 100) : 0;

  return React.createElement("div", null,
    // KPIs
    React.createElement("div", {style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}},
      [
        {l:"Total ouvrages",v:DIAG_RECORDS.length,c:C.accent,i:"🏗️"},
        {l:"Travaux faits",v:doneCount,c:C.green,i:"✅"},
        {l:"En attente",v:DIAG_RECORDS.length-doneCount,c:C.red,i:"⏳"},
        {l:"Progression",v:progPct+"%",c:progPct>=75?C.green:progPct>=40?C.yellow:C.red,i:"📊"},
        {l:"Filtrés / affichés",v:filtered.length,c:C.muted,i:"🔍"}
      ].map((k,i)=>React.createElement("div",{key:i,style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",textAlign:"center"}},
        React.createElement("div",{style:{fontSize:18,marginBottom:3}},k.i),
        React.createElement("div",{style:{fontFamily:"monospace",fontSize:15,fontWeight:800,color:k.c}},k.v),
        React.createElement("div",{style:{fontSize:9,color:C.muted,marginTop:1}},k.l)
      ))
    ),

    // Barre de progression
    React.createElement("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 16px",marginBottom:14}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
        React.createElement("span",{style:{fontSize:11,fontWeight:700,color:C.text}},"📈 Avancement des travaux"),
        React.createElement("span",{style:{fontSize:11,fontFamily:"monospace",color:progPct>=75?C.green:C.yellow}},doneCount+" / "+DIAG_RECORDS.length+" ouvrages traités")
      ),
      React.createElement("div",{style:{height:8,background:C.bg,borderRadius:4,overflow:"hidden"}},
        React.createElement("div",{style:{height:"100%",width:progPct+"%",background:progPct>=75?C.green:progPct>=40?C.yellow:C.red,borderRadius:4,transition:"width 0.4s"}})
      )
    ),

    // Filtres
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}},
      React.createElement("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Rechercher secteur, localité...",style:{padding:"6px 12px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,fontSize:12,outline:"none",width:200}}),
      React.createElement("select",{value:filterEtat,onChange:e=>setFilterEtat(e.target.value),style:{padding:"6px 10px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,fontSize:11,outline:"none"}},
        React.createElement("option",{value:"all"},"Tous états"),
        React.createElement("option",{value:"bon"},"✅ Bon état"),
        React.createElement("option",{value:"moyen"},"🟡 Moyen"),
        React.createElement("option",{value:"mauvais"},"🔴 Mauvais"),
        React.createElement("option",{value:"nonexist"},"⬜ Non existant")
      ),
      React.createElement("select",{value:filterOuvrage,onChange:e=>setFilterOuvrage(e.target.value),style:{padding:"6px 10px",background:C.bg,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,fontSize:11,outline:"none"}},
        React.createElement("option",{value:"all"},"Tous types"),
        React.createElement("option",{value:"regard"},"🔍 Regards"),
        React.createElement("option",{value:"chambre"},"🚪 Chambres de vannes"),
        React.createElement("option",{value:"station"},"⚡ Stations / Surpresseurs"),
        React.createElement("option",{value:"reservoir"},"💧 Réservoirs")
      ),
      React.createElement("div",{style:{fontSize:11,color:C.muted}},filtered.length+" / "+DIAG_RECORDS.length),
      React.createElement("div",{style:{marginLeft:"auto",display:"flex",gap:6}},
        ["table","carte"].map(v=>React.createElement("button",{key:v,onClick:()=>setViewMode(v),style:{padding:"6px 14px",background:viewMode===v?`${C.accent}22`:"transparent",border:`1px solid ${viewMode===v?C.accent:C.border}`,color:viewMode===v?C.accent:C.muted,borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600}},v==="table"?"📋 Tableau":"🗺️ Carte"))
      )
    ),

    // Carte

  const [syncStatus, setSyncStatus] = React.useState('idle');
  const [sectors, setSectors] = React.useState(initialSectors);

  // Synchroniser si le parent met à jour
  React.useEffect(() => { setSectors(initialSectors); }, [initialSectors]);

  const allInterventions = React.useMemo(() => {
    const all = [];
    sectors.forEach(s => {
      try { JSON.parse(localStorage.getItem("interventions_"+s.id)||"[]").forEach(i=>all.push(i)); } catch(e){}
    });
    try { JSON.parse(localStorage.getItem("interventions_global")||"[]").forEach(i=>all.push(i)); } catch(e){}
    return all;
  }, [sectors]);

  const handleRefresh = async () => {
    setSyncStatus('loading');
    try {
      await onRefresh();
      // Recharger depuis Firestore + fusion avec localStorage
      const r = await window.storage.get("sonede_ee_rdf_v4");
      if (r && r.value) {
        const parsed = JSON.parse(r.value);
        if (parsed.sectors && parsed.sectors.length > 0) {
          // Fusionner avec données locales complètes
          const localFull = localStorage.getItem("sonede_ee_rdf_v4_full");
          const localSectors = localFull ? JSON.parse(localFull).sectors : [];
          const merged = parsed.sectors.map(cloudS => {
            const localS = localSectors.find(ls => ls.id === cloudS.id);
            if (localS && localS.data && Object.keys(localS.data).length > 0) {
              return { ...cloudS, data: { ...cloudS.data, ...localS.data } };
            }
            return cloudS;
          });
          setSectors(merged);
        }
      }
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('offline');

    setTimeout(() => setSyncStatus('idle'), 3000);

  // Charger au montage

// ─── TABLEAU DE BORD DIRECTEUR ────────────────────────────────────────────────
function DirecteurDashboard({ sectors, rdfCustom, onClose }) {
  const [customData, setCustomData] = React.useState(rdfCustom || []);

  // Charger depuis Firestore en temps réel
  React.useEffect(() => {
    window.storage.get('sonede_rdf_custom').then(r => {
      if (r?.value) { try { setCustomData(JSON.parse(r.value)); } catch(e){} }
    }).catch(()=>{});
    // Écouter les mises à jour
    const unsub = window.storage.listenRealtime('sonede_rdf_custom', val => {
      try { setCustomData(JSON.parse(val)); } catch(e) {}
    });
    return () => { if(typeof unsub === 'function') unsub(); };
  }, []);

  // Toutes les fuites : données fixes 2025 + données saisies
  const allFuites = [...ALL_RDF_DATA, ...customData];
  const totalFuites = allFuites.length;
  const totalRep = allFuites.filter(f => f.repare == 1 || f.repare === "1").length;
  const txRep = totalFuites > 0 ? Math.round((totalRep / totalFuites) * 100) : 0;

  // Km réseau total : depuis secteurs + depuis customData (délégations des fuites)
  const totalKm = React.useMemo(() => {
    // Priorité 1 : kmReseau saisi dans les secteurs
    const kmSecteurs = sectors.reduce((a,s) => { try { return a + (parseFloat(s.kmReseau)||0); } catch(e){ return a; } }, 0);
    if (kmSecteurs > 0) return kmSecteurs;
    // Priorité 2 : données reseau dans sectors.data
    return sectors.reduce((a,s) => { try { return a + (parseFloat(s.data?.reseau?.totalKm)||0); } catch(e){ return a; } }, 0);
  }, [sectors]);

  const ilf = totalKm > 0 ? (totalFuites / totalKm).toFixed(2) : "—";

  // Km inspectés depuis données RDF 2025
  const kmInspectes2025 = React.useMemo(() => {
    const rdfKm = ALL_RDF_DATA.reduce((a,f) => a + (parseFloat(f.km)||0), 0);
    const customKm = customData.reduce((a,f) => a + (parseFloat(f.km)||0), 0);
    return (rdfKm + customKm).toFixed(1);
  }, [customData]);

  // MNF moyen depuis secteurs
  const mnfAvg = (() => {
    const vals = sectors.map(s => s.data?.debit?.stats?.mnf).filter(v => v != null && !isNaN(v));
    return vals.length > 0 ? (vals.reduce((a,b) => a + parseFloat(b), 0) / vals.length).toFixed(2) : "—";
  })();

  const moisData = BILAN_MENSUEL_2025.map(m => ({
    name: m.mois.slice(0,3),
    fuites: m.fuites,
    reparees: m.reparees,
    gains: m.gains_m3j.toFixed(0)
  }));

  const kpis = [
    {l:"Secteurs actifs", v:sectors.length, c:C.accent, i:"📍", sub:"Total Tataouine"},
    {l:"Fuites détectées", v:totalFuites, c:C.red, i:"💧", sub:"Toutes années confondues"},
    {l:"Taux réparation", v:txRep+"%", c:txRep>=90?C.green:txRep>=70?C.yellow:C.red, i:"🔧", sub:"Objectif: 90%"},
    {l:"ILF global", v:ilf+" f/km", c:C.muted, i:"📐", sub:"Objectif: <1.5"},
    {l:"MNF moyen", v:mnfAvg+" l/s", c:C.purple, i:"📊", sub:"Tous secteurs"},
    {l:"Km réseau", v:totalKm > 0 ? totalKm.toFixed(1)+" km" : "—", c:C.yellow, i:"🗺️", sub:"Réseau total"},
    {l:"Km inspectés 2025", v:kmInspectes2025+" km", c:C.green, i:"🔍", sub:"Depuis données RDF"},
  ];

  return React.createElement("div", {style:{position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)"}},
    React.createElement("div", {style:{background:C.bg, borderRadius:16, width:"95vw", maxWidth:1100, maxHeight:"92vh", overflowY:"auto", padding:28, boxShadow:"0 25px 50px rgba(0,0,0,0.15)"}},

      // Header
      React.createElement("div", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24, paddingBottom:16, borderBottom:`2px solid ${C.accent}`}},
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:22, fontWeight:800, color:C.text}}, "📊 TABLEAU DE BORD DIRECTEUR"),
          React.createElement("div", {style:{fontSize:12, color:C.muted, marginTop:2}}, "Hydro Flow EBK — Vue d'ensemble " + new Date().toLocaleDateString("fr-FR"))
        ),
        React.createElement("button", {onClick:onClose, style:{padding:"8px 18px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, color:C.muted, cursor:"pointer", fontWeight:700}}, "✕ Fermer")
      ),

      // KPIs
      React.createElement("div", {style:{display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:12, marginBottom:24}},
        kpis.map((k,i) => React.createElement("div", {key:i, style:{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, textAlign:"center", boxShadow:C.shadow}},
          React.createElement("div", {style:{fontSize:26, marginBottom:6}}, k.i),
          React.createElement("div", {style:{fontSize:22, fontWeight:800, color:k.c, fontFamily:"monospace"}}, k.v),
          React.createElement("div", {style:{fontSize:11, fontWeight:700, color:C.text, marginTop:4}}, k.l),
          React.createElement("div", {style:{fontSize:10, color:C.muted}}, k.sub)
        ))
      ),

      // Objectifs vs Réalisations
      React.createElement("div", {style:{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:20, marginBottom:20, boxShadow:C.shadow}},
        React.createElement("div", {style:{fontSize:14, fontWeight:700, color:C.text, marginBottom:16}}, "🎯 OBJECTIFS vs RÉALISATIONS 2025"),
        React.createElement("div", {style:{display:"grid", gap:14}},
          [
            {l:"Taux réparation", val:txRep, target:90, unit:"%", c:txRep>=90?C.green:C.yellow},
            {l:"ILF (fuites/km)", val:parseFloat(ilf)||0, target:1.5, unit:" f/km", c:(parseFloat(ilf)||0)<=1.5?C.green:C.red, inverse:true},
            {l:"Km inspectés 2025", val:kmInspectes2025, target:300, unit:" km", c:C.accent},
            {l:"Fuites réparées 2025", val:BILAN_MENSUEL_2025.reduce((a,m)=>a+m.reparees,0), target:100, unit:" fuites", c:C.green},
          ].map((obj,i) => {
            const pct = obj.inverse
              ? Math.min(100, Math.round(((obj.target*2 - parseFloat(obj.val)) / (obj.target*2)) * 100))
              : Math.min(100, Math.round((parseFloat(obj.val) / obj.target) * 100));
            return React.createElement("div", {key:i},
              React.createElement("div", {style:{display:"flex", justifyContent:"space-between", marginBottom:4}},
                React.createElement("span", {style:{fontSize:12, color:C.text, fontWeight:600}}, obj.l),
                React.createElement("span", {style:{fontSize:12, fontFamily:"monospace", color:obj.c, fontWeight:700}}, obj.val+obj.unit+" / "+obj.target+obj.unit)
              ),
              React.createElement("div", {style:{height:8, background:C.border, borderRadius:4, overflow:"hidden"}},
                React.createElement("div", {style:{width:pct+"%", height:"100%", background:obj.c, borderRadius:4, transition:"width 0.5s"}})
              )
            );
          })
        )
      ),

      // Graphique mensuel
      React.createElement("div", {style:{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:20, boxShadow:C.shadow}},
        React.createElement("div", {style:{fontSize:14, fontWeight:700, color:C.text, marginBottom:16}}, "📈 BILAN MENSUEL 2025 — Fuites & Réparations"),
        React.createElement(Recharts.ResponsiveContainer, {width:"100%", height:200},
          React.createElement(Recharts.BarChart, {data:moisData, margin:{top:5,right:10,left:0,bottom:5}},
            React.createElement(Recharts.CartesianGrid, {strokeDasharray:"3 3", stroke:C.border}),
            React.createElement(Recharts.XAxis, {dataKey:"name", tick:{fontSize:10, fill:C.muted}}),
            React.createElement(Recharts.YAxis, {tick:{fontSize:10, fill:C.muted}}),
            React.createElement(Recharts.Tooltip, {contentStyle:{background:C.card, border:`1px solid ${C.border}`, borderRadius:8}}),
            React.createElement(Recharts.Legend, {iconSize:10, wrapperStyle:{fontSize:11}}),
            React.createElement(Recharts.Bar, {dataKey:"fuites", name:"Fuites", fill:C.red, radius:[4,4,0,0]}),
            React.createElement(Recharts.Bar, {dataKey:"reparees", name:"Réparées", fill:C.green, radius:[4,4,0,0]})
          )
        )
      )
    )
  );
}

function ForagesGlobalView({ sectors }) {
  const [allForages, setAllForages] = React.useState([]);
  const [refreshKey, setRefreshKey] = React.useState(0);
  const [showAddGlobal, setShowAddGlobal] = React.useState(false);
  const [newForageGlobal, setNewForageGlobal] = React.useState({
    nom:"", type:"Forage", secteurId: sectors.length>0 ? sectors[0].id : "", debitNominal:0, debitActuel:0,
    heuresMarche:0, consommationKwh:0, niveauStatique:0, niveauDynamique:0,
    dateReleve:"", statut:"Actif", observations:""
  });

  React.useEffect(() => {
    const load = async () => {
      const all = [];
      for (const s of sectors) {
        try {
          const r = await window.storage.get("forages_" + s.id);
          if (r?.value) {
            const data = JSON.parse(r.value);
            data.forEach(f => all.push({...f, secteurId: s.id, secteurNom: s.name}));
          }
        } catch(e) {}
      }
      setAllForages(all);
    };
    load();
  }, [sectors, refreshKey]);

  const saveForageGlobal = async () => {
    if (!newForageGlobal.nom.trim()) {
      alert("Veuillez saisir un nom pour l'ouvrage");
      return;
    }
    // Utiliser premier secteur si non défini
    if (!newForageGlobal.secteurId && sectors.length > 0) {
      newForageGlobal.secteurId = sectors[0].id;
    }
    const secteur = sectors.find(s => s.id === newForageGlobal.secteurId);
    if (!secteur) return;
    const storKey = "forages_" + newForageGlobal.secteurId;
    let existing = [];
    try {
      const r = await window.storage.get(storKey);
      if (r?.value) existing = JSON.parse(r.value);
    } catch(e) {}
    const newF = {...newForageGlobal, id: Date.now(), dateReleve: newForageGlobal.dateReleve || new Date().toLocaleDateString("fr-FR")};
    const updated = [...existing, newF];
    localStorage.setItem(storKey, JSON.stringify(updated));
    await window.storage.set(storKey, JSON.stringify(updated)).catch(()=>{});
    setShowAddGlobal(false);
    setNewForageGlobal({nom:"", type:"Forage", secteurId:sectors.length>0?sectors[0].id:"", debitNominal:0, debitActuel:0, heuresMarche:0, consommationKwh:0, niveauStatique:0, niveauDynamique:0, dateReleve:"", statut:"Actif", observations:""});
    setRefreshKey(k => k+1);
  };

  const totalActifs = allForages.filter(f => f.statut === "Actif").length;
  const totalPannes = allForages.filter(f => f.statut === "En panne").length;
  const alertes = allForages.filter(f => f.debitNominal > 0 && (f.debitActuel / f.debitNominal) < 0.8);

  return React.createElement("div", null,
    // Barre actions
    React.createElement("div", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, gap:10}},

      React.createElement("div", {style:{display:"flex", gap:8}},
        React.createElement("button", {
          onClick:()=>setShowAddGlobal(true),
          style:{padding:"7px 16px", background:C.green, color:"#fff", border:"none", borderRadius:6, fontWeight:700, cursor:"pointer", fontSize:12}
        }, "+ Ajouter ouvrage"),
        React.createElement("button", {onClick:()=>setRefreshKey(k=>k+1), style:{padding:"7px 16px", background:C.accent, color:"#fff", border:"none", borderRadius:6, fontWeight:700, cursor:"pointer", fontSize:12}}, "🔄 Actualiser")
      )
    ),

    // KPIs globaux
    React.createElement("div", {style:{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:12, marginBottom:20}},
      [
        {l:"Total ouvrages", v:allForages.length, c:C.accent, i:"🏗️"},
        {l:"Actifs", v:totalActifs, c:C.green, i:"✅"},
        {l:"En panne", v:totalPannes, c:C.red, i:"🔴"},
        {l:"Alertes débit", v:alertes.length, c:C.yellow, i:"⚠️"},
        {l:"Secteurs couverts", v:new Set(allForages.map(f=>f.secteurNom)).size, c:C.purple, i:"📍"},
      ].map((k,i) => React.createElement("div", {key:i, style:{background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:16, textAlign:"center", boxShadow:C.shadow}},
        React.createElement("div", {style:{fontSize:24, marginBottom:4}}, k.i),
        React.createElement("div", {style:{fontSize:24, fontWeight:800, color:k.c, fontFamily:"monospace"}}, k.v),
        React.createElement("div", {style:{fontSize:11, color:C.muted, marginTop:2}}, k.l)
      ))
    ),

    // Formulaire ajout global
    showAddGlobal && React.createElement("div", {style:{background:C.card, border:`1px solid ${C.accent}44`, borderRadius:12, padding:20, marginBottom:20, boxShadow:C.shadowMd}},
      React.createElement("div", {style:{fontSize:14, fontWeight:700, color:C.accent, marginBottom:14}}, "➕ Nouvel ouvrage — sélectionnez un secteur"),
      React.createElement("div", {style:{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:12}},
        // Nom

        ),

function IndexForagesTab({ sectors }) {
  const storKey = "index_forages_global";
  const [releves, setReleves] = React.useState([]);
  const [showAdd, setShowAdd] = React.useState(false);
  const [refreshKey, setRefreshKey] = React.useState(0);
  const [newReleve, setNewReleve] = React.useState({
    forageId:"", forageNom:"", mois:"", annee: new Date().getFullYear(),
    index:""
  });

  // Charger tous les forages de tous les secteurs
  const [allForages, setAllForages] = React.useState([]);
  React.useEffect(() => {
    const load = async () => {
      const all = [];
      for (const s of sectors) {
        try {
          const r = await window.storage.get("forages_" + s.id);
          if (r?.value) JSON.parse(r.value).forEach(f => all.push({...f, secteurNom:s.name}));
        } catch(e) {}
      }
      setAllForages(all);
      // Charger relevés
      try {
        const r = await window.storage.get(storKey);
        if (r?.value) setReleves(JSON.parse(r.value));
      } catch(e) {
        try {
          const saved = localStorage.getItem(storKey);
          if (saved) setReleves(JSON.parse(saved));
        } catch(e2) {}
      }
    };
    load();
  }, [sectors, refreshKey]);

  const save = async (data) => {
    setReleves(data);
    localStorage.setItem(storKey, JSON.stringify(data));
    await window.storage.set(storKey, JSON.stringify(data)).catch(()=>{});
  };

  const MOIS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

  // Calculer consommation par soustraction d'index
  // Pour chaque forage, trier par année+mois et calculer la diff
  const getConsommation = (forageId, mois, annee) => {
    const relevesForage = releves
      .filter(r => r.forageId === forageId)
      .sort((a,b) => a.annee !== b.annee ? a.annee-b.annee : MOIS.indexOf(a.mois)-MOIS.indexOf(b.mois));

    const idx = relevesForage.findIndex(r => r.mois === mois && r.annee === annee);
    if (idx <= 0) return null; // Premier relevé ou pas trouvé

    const current = parseFloat(relevesForage[idx].index);
    const prev = parseFloat(relevesForage[idx-1].index);
    if (isNaN(current) || isNaN(prev)) return null;

    // Calculer nombre de jours entre les deux relevés
    const moisCurr = MOIS.indexOf(mois);
    const moisPrev = MOIS.indexOf(relevesForage[idx-1].mois);
    const dateCurr = new Date(annee, moisCurr, 15);
    const datePrev = new Date(relevesForage[idx-1].annee, moisPrev, 15);
    const jours = Math.round((dateCurr - datePrev) / (1000*60*60*24));

    const conso = current - prev;
    const debitMoyen = jours > 0 ? (conso * 1000 / (jours * 86400)).toFixed(2) : "—";

    return { conso: conso.toFixed(1), jours, debitMoyen };
  };

  // Grouper par forage pour affichage
  const foragesAvecReleves = allForages.filter(f =>
    releves.some(r => r.forageId === f.id)
  );

  return React.createElement("div", {style:{padding:20}},
    // Header
    React.createElement("div", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20}},
      React.createElement("div", null,
        React.createElement("div", {style:{fontSize:18, fontWeight:800, color:C.text}}, "📊 RELEVÉS D'INDEX — FORAGES & STATIONS"),
        React.createElement("div", {style:{fontSize:12, color:C.muted, marginTop:2}}, "Calcul automatique de consommation par soustraction d'index")
      ),
      React.createElement("button", {onClick:()=>setShowAdd(!showAdd), style:{padding:"8px 18px", background:C.accent, color:"#fff", border:"none", borderRadius:8, fontWeight:700, cursor:"pointer"}}, "+ Saisir relevé")
    ),

    // Formulaire saisie relevé
    showAdd && React.createElement("div", {style:{background:C.card, border:`1px solid ${C.accent}44`, borderRadius:12, padding:20, marginBottom:20, boxShadow:C.shadowMd}},
      React.createElement("div", {style:{fontSize:14, fontWeight:700, color:C.accent, marginBottom:14}}, "📏 Nouveau relevé d'index"),
      React.createElement("div", {style:{display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:10, marginBottom:12}},
        // Forage
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:10, color:C.muted, marginBottom:3, fontWeight:600}}, "OUVRAGE *"),
          React.createElement("select", {
            value:newReleve.forageId,
            onChange:e=>{
              const f = allForages.find(f=>f.id==e.target.value);
              setNewReleve({...newReleve, forageId:e.target.value, forageNom:f?f.nom:""});
            },
            style:{width:"100%", padding:"7px 10px", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, fontSize:12}
          },
            React.createElement("option", {value:""}, "-- Choisir --"),
            allForages.map(f => React.createElement("option", {key:f.id, value:f.id}, f.nom + " ("+f.secteurNom+")"))
          )
        ),
        // Mois
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:10, color:C.muted, marginBottom:3, fontWeight:600}}, "MOIS *"),
          React.createElement("select", {
            value:newReleve.mois,
            onChange:e=>setNewReleve({...newReleve, mois:e.target.value}),
            style:{width:"100%", padding:"7px 10px", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, fontSize:12}
          },
            React.createElement("option", {value:""}, "-- Mois --"),
            MOIS.map(m => React.createElement("option", {key:m, value:m}, m))
          )
        ),
        // Année
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:10, color:C.muted, marginBottom:3, fontWeight:600}}, "ANNÉE *"),
          React.createElement("select", {
            value:newReleve.annee,
            onChange:e=>setNewReleve({...newReleve, annee:parseInt(e.target.value)}),
            style:{width:"100%", padding:"7px 10px", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, fontSize:12}
          },

          )
        ),
        // Index
        React.createElement("div", null,
          React.createElement("div", {style:{fontSize:10, color:C.muted, marginBottom:3, fontWeight:600}}, "INDEX (m³) *"),
          React.createElement("input", {
            type:"number", step:"0.1",
            value:newReleve.index,
            onChange:e=>setNewReleve({...newReleve, index:e.target.value}),
            placeholder:"ex: 12543.5",
            style:{width:"100%", padding:"7px 10px", background:C.bg, border:`1px solid ${C.border}`, color:C.text, borderRadius:6, fontSize:12, outline:"none"}
          })
        )
      ),
      React.createElement("div", {style:{background:`${C.accent}10`, border:`1px solid ${C.accent}30`, borderRadius:8, padding:"10px 14px", marginBottom:12, fontSize:11, color:C.muted}},
        "💡 La consommation est calculée automatiquement par soustraction : Index(mois N) − Index(mois N-1). Si un mois est manquant, le calcul s'adapte automatiquement."
      ),
      React.createElement("div", {style:{display:"flex", gap:8}},
        React.createElement("button", {
          onClick: async () => {
            if (!newReleve.forageId || !newReleve.mois || !newReleve.index) {
              alert("Veuillez remplir tous les champs obligatoires");
              return;
            }
            // Vérifier doublon
            const existe = releves.find(r => r.forageId==newReleve.forageId && r.mois===newReleve.mois && r.annee===newReleve.annee);
            if (existe) {
              if (!confirm("Un relevé existe déjà pour " + newReleve.forageNom + " en " + newReleve.mois + " " + newReleve.annee + ". Remplacer ?")) return;
              await save(releves.filter(r => !(r.forageId==newReleve.forageId && r.mois===newReleve.mois && r.annee===newReleve.annee)).concat({...newReleve, id:Date.now()}));
            } else {
              await save([...releves, {...newReleve, id:Date.now()}]);
            }
            setShowAdd(false);
            setNewReleve({forageId:"", forageNom:"", mois:"", annee:new Date().getFullYear(), index:""});
            setRefreshKey(k=>k+1);
          },
          style:{padding:"8px 24px", background:C.green, color:"#fff", border:"none", borderRadius:6, fontWeight:700, cursor:"pointer"}
        }, "✅ Enregistrer"),
        React.createElement("button", {onClick:()=>setShowAdd(false), style:{padding:"8px 20px", background:C.surface, border:`1px solid ${C.border}`, color:C.muted, borderRadius:6, cursor:"pointer"}}, "Annuler")
      )
    ),

    // Tableau par forage
    foragesAvecReleves.length === 0
      ? React.createElement("div", {style:{textAlign:"center", padding:60, color:C.muted, background:C.card, borderRadius:12, boxShadow:C.shadow}},
          React.createElement("div", {style:{fontSize:40, marginBottom:12}}, "📊"),
          React.createElement("div", {style:{fontSize:14, fontWeight:600}}, "Aucun relevé saisi"),
          React.createElement("div", {style:{fontSize:12, marginTop:4}}, "Cliquez sur + Saisir relevé pour commencer")
        )
      : React.createElement("div", {style:{display:"flex", flexDirection:"column", gap:16}},
          foragesAvecReleves.map(forage => {
            const relevesForage = releves

            return React.createElement("div", {key:forage.id, style:{background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:"hidden", boxShadow:C.shadow}},

              React.createElement("table", {style:{width:"100%", borderCollapse:"collapse"}},

                    ["Mois", "Année", "Index (m³)", "Période", "Conso. (m³)", "Débit moy. (l/s)", ""].map(h =>
                      React.createElement("th", {key:h, style:{padding:"9px 14px", textAlign:"left", fontSize:11, color:C.muted, fontWeight:700, borderBottom:`1px solid ${C.border}`}}, h)
                    )

var C2 = {
  bg:"#F1F5F9", card:"#FFFFFF", surface:"#F8FAFC", border:"#E2E8F0",
  accent:"#0EA5E9", green:"#10B981", yellow:"#F59E0B", red:"#EF4444",
  purple:"#8B5CF6", text:"#1E293B", muted:"#64748B"
};

function n2(v, dec) {
  dec = (dec === undefined) ? 2 : dec;
  var x = parseFloat(v) || 0;
  return parseFloat(x.toFixed(dec));
}
function fmtN(v, dec) {
  dec = (dec === undefined) ? 2 : dec;
  return n2(v, dec).toLocaleString("fr-FR", {minimumFractionDigits: dec, maximumFractionDigits: dec});
}
function pctN(part, total) {
  if (!total) return 0;
  return n2((part / total) * 100, 1);
}
function KV2(props) {
  var lbl = props.label;
  var val = props.value;
  var unit = props.unit || "";
  var color = props.color || C2.accent;

  return React.createElement("div",
    {style:{textAlign:"center",padding:"10px 14px",background:C2.card,border:"1px solid "+C2.border,borderRadius:8}},
    React.createElement("div",
      {style:{fontFamily:"monospace",fontSize:size,fontWeight:800,color:color}},
      val,
      unit ? React.createElement("span",{style:{fontSize:size*0.55,color:C2.muted,marginLeft:3}}, unit) : null
    ),
    React.createElement("div", {style:{fontSize:10,color:C2.muted,marginTop:3}}, lbl)
  );
}
